name: Flashsales Deploy Pre

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: flashsales-deploy-pre-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  product-service-unit-gate:
    name: Unit Gate - Product Service Lifecycle, Contract, And Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install product-service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r flashsale/product-service/requirements.txt

      - name: Run product-service unit tests
        working-directory: flashsale/product-service
        run: |
          python -m unittest discover -s tests/unit -t . -p 'test_*.py'

  order-service-unit-gate:
    name: Unit Gate - Order Service Lifecycle, Webhooks, Contract, And Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install order-service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r flashsale/order-service/requirements.txt

      - name: Run order-service unit tests
        working-directory: flashsale/order-service
        run: |
          python -m unittest discover -s tests/unit -t . -p 'test_*.py'

  product-service-compose-integration-gate:
    name: Integration Gate - Docker Compose Product Service
    runs-on: ubuntu-latest
    needs:
      - product-service-unit-gate
      - order-service-unit-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Run product-service compose integration
        run: |
          python3 flashsale/scripts/flashsale_compose_integration.py --suite product

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f flashsale/docker-compose.yaml logs --no-color || true

  order-service-compose-integration-gate:
    name: Integration Gate - Docker Compose Order Service
    runs-on: ubuntu-latest
    needs:
      - product-service-unit-gate
      - order-service-unit-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Run order-service compose integration
        run: |
          python3 flashsale/scripts/flashsale_compose_integration.py --suite order

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f flashsale/docker-compose.yaml logs --no-color || true
