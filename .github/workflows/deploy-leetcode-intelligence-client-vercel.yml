name: Deploy LeetCode Intelligence Client to Vercel

# Important boundary:
# - application/leetcode-intelligence/client is a Vercel-only surface
# - the rest of leetcode-intelligence services continue to deploy through self-hosted workflows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'application/leetcode-intelligence'
      - '.gitmodules'
      - '.github/workflows/deploy-leetcode-intelligence-client-vercel.yml'

concurrency:
  group: deploy-leetcode-intelligence-client-vercel-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  VERCEL_ORG_ID_SSM_NAME: ${{ vars.VERCEL_ORG_ID_SSM_NAME || '/vercel/VERCEL_ORG_ID' }}
  VERCEL_TOKEN_SSM_NAME: ${{ vars.VERCEL_TOKEN_SSM_NAME || '/vercel/VERCEL_TOKEN' }}
  VERCEL_PROJECT_ID_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_PROJECT_ID_SSM_NAME || '/leetcode-intelligence/VERCEL_PROJECT_ID' }}
  BFF_TOKEN_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_BFF_TOKEN_SSM_NAME || '/leetcode-intelligence/BFF_TOKEN' }}
  BFF_SERVICE_URL: ${{ vars.LEETCODE_INTELLIGENCE_BFF_SERVICE_URL || '' }}
  UPSTASH_REDIS_REST_URL_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_UPSTASH_REDIS_REST_URL_SSM_NAME || '/leetcode-intelligence/UPSTASH_REDIS_REST_URL' }}
  UPSTASH_REDIS_REST_TOKEN_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_UPSTASH_REDIS_REST_TOKEN_SSM_NAME || '/leetcode-intelligence/UPSTASH_REDIS_REST_TOKEN' }}
  NON_ADMIN_RATE_LIMIT_MAX_REQUESTS_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_NON_ADMIN_RATE_LIMIT_MAX_REQUESTS_SSM_NAME || '/leetcode-intelligence/NON_ADMIN_RATE_LIMIT_MAX_REQUESTS' }}
  NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS_SSM_NAME || '/leetcode-intelligence/NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS' }}

jobs:
  deploy:
    name: Deploy application/leetcode-intelligence/client to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homelab-cloud with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate AWS configuration
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "AWS_ACCESS_KEY_ID secret is missing"
            exit 1
          fi

          if [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret is missing"
            exit 1
          fi

          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION repository variable is missing"
            exit 1
          fi

          if [ -z "${VERCEL_ORG_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_ORG_ID_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${VERCEL_TOKEN_SSM_NAME:-}" ]; then
            echo "VERCEL_TOKEN_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${VERCEL_PROJECT_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_PROJECT_ID_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${BFF_TOKEN_SSM_NAME:-}" ]; then
            echo "BFF_TOKEN_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${BFF_SERVICE_URL:-}" ]; then
            echo "LEETCODE_INTELLIGENCE_BFF_SERVICE_URL repository variable is missing"
            exit 1
          fi

          if [ -z "${UPSTASH_REDIS_REST_URL_SSM_NAME:-}" ]; then
            echo "UPSTASH_REDIS_REST_URL_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${UPSTASH_REDIS_REST_TOKEN_SSM_NAME:-}" ]; then
            echo "UPSTASH_REDIS_REST_TOKEN_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${NON_ADMIN_RATE_LIMIT_MAX_REQUESTS_SSM_NAME:-}" ]; then
            echo "NON_ADMIN_RATE_LIMIT_MAX_REQUESTS_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS_SSM_NAME:-}" ]; then
            echo "NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS_SSM_NAME is missing"
            exit 1
          fi

          test -f application/leetcode-intelligence/client/package.json || {
            echo "application/leetcode-intelligence/client/package.json not found"
            exit 1
          }
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve Vercel configuration from AWS SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          bash .github/scripts/resolve-ssm-env.sh \
            VERCEL_ORG_ID="$VERCEL_ORG_ID_SSM_NAME" \
            VERCEL_TOKEN="$VERCEL_TOKEN_SSM_NAME" \
            VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID_SSM_NAME" \
            BFF_TOKEN="$BFF_TOKEN_SSM_NAME" \
            UPSTASH_REDIS_REST_URL="$UPSTASH_REDIS_REST_URL_SSM_NAME" \
            UPSTASH_REDIS_REST_TOKEN="$UPSTASH_REDIS_REST_TOKEN_SSM_NAME" \
            NON_ADMIN_RATE_LIMIT_MAX_REQUESTS="$NON_ADMIN_RATE_LIMIT_MAX_REQUESTS_SSM_NAME" \
            NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS="$NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS_SSM_NAME"

      - name: Sync production env to Vercel
        working-directory: application/leetcode-intelligence/client
        run: |
          set -euo pipefail

          upsert_env() {
            local name="$1"
            local value="$2"
            local tmp log
            tmp="$(mktemp)"
            log="$(mktemp)"
            printf '%s' "$value" > "$tmp"

            if npx vercel env add "$name" production --token="$VERCEL_TOKEN" < "$tmp" >"$log" 2>&1; then
              rm -f "$tmp" "$log"
              return 0
            fi

            if grep -qi "already exists" "$log"; then
              if ! npx vercel env update "$name" production --token="$VERCEL_TOKEN" < "$tmp"; then
                rm -f "$tmp" "$log"
                echo "Failed to update Vercel environment variable $name" >&2
                exit 1
              fi
              rm -f "$tmp" "$log"
              return 0
            fi

            rm -f "$tmp" "$log"
            echo "Failed to create Vercel environment variable $name" >&2
            exit 1
          }

          upsert_env BFF_SERVICE_URL "$BFF_SERVICE_URL"
          upsert_env BFF_TOKEN "$BFF_TOKEN"
          upsert_env UPSTASH_REDIS_REST_URL "$UPSTASH_REDIS_REST_URL"
          upsert_env UPSTASH_REDIS_REST_TOKEN "$UPSTASH_REDIS_REST_TOKEN"
          upsert_env NON_ADMIN_RATE_LIMIT_MAX_REQUESTS "$NON_ADMIN_RATE_LIMIT_MAX_REQUESTS"
          upsert_env NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS "$NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/leetcode-intelligence/package-lock.json

      - name: Install client dependencies
        working-directory: application/leetcode-intelligence
        run: npm ci

      - name: Pull Vercel environment
        working-directory: application/leetcode-intelligence/client
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        working-directory: application/leetcode-intelligence/client
        run: npx vercel deploy --yes --prod --token="$VERCEL_TOKEN"
