name: Terraform Strategy Tester Resources

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  push:
    branches:
      - main
    paths:
      - "terraform/strategy-tester/**"
      - ".github/workflows/terraform-strategy-tester-resources.yml"

concurrency:
  group: strategy-tester-resources
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || inputs.action }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_grafana_url: ${{ vars.GRAFANA_URL }}
      TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
      TF_VAR_neon_datasource_uid: ${{ vars.STRATEGY_TESTER_GRAFANA_NEON_DATASOURCE_UID }}
      TF_VAR_strategy_tester_namespace: ${{ vars.STRATEGY_TESTER_NAMESPACE || 'strategy-tester' }}
      TF_VAR_grafana_folder_title: ${{ vars.STRATEGY_TESTER_GRAFANA_FOLDER_TITLE || 'Strategy Tester' }}
      TF_VAR_grafana_folder_uid: ${{ vars.STRATEGY_TESTER_GRAFANA_FOLDER_UID || 'strategy-tester-folder' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/strategy-tester

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_grafana_url:-}" ]; then
            echo "GRAFANA_URL variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_grafana_auth:-}" ]; then
            echo "GRAFANA_AUTH secret is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_neon_datasource_uid:-}" ]; then
            echo "STRATEGY_TESTER_GRAFANA_NEON_DATASOURCE_UID variable is missing"
            exit 1
          fi

      - name: Terraform shared flow
        uses: ./.github/actions/terraform-run
        with:
          working_directory: terraform/strategy-tester
          backend_bucket: ${{ env.TF_STATE_BUCKET }}
          backend_key: strategy-tester/resources/terraform.tfstate
          aws_region: ${{ env.AWS_REGION }}
          action: ${{ github.event_name == 'push' && 'apply' || inputs.action }}

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        uses: ./.github/actions/notify-discord
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          aws_region: ${{ vars.AWS_REGION }}
          discord_webhook_ssm_name: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          workflow_name: Terraform Strategy Tester Resources
          needs_json: ${{ toJson(needs) }}
