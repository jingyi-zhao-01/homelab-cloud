name: Terraform Flashsale Resources

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  workflow_call:
    inputs:
      action:
        description: "Terraform action to run when called as reusable workflow"
        required: false
        default: apply
        type: string
    secrets:
      NEON_API_KEY:
        required: true
      GRAFANA_AUTH:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      TF_STATE_BUCKET:
        required: true

  push:
    branches:
      - main
    paths:
      - 'terraform/flashsale/**'
      - '.github/workflows/terraform-flashsale-resources.yml'

concurrency:
  group: flashsale-resources
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
      TF_VAR_grafana_url: ${{ vars.GRAFANA_URL }}
      TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
      TF_VAR_neon_datasource_uid: ${{ vars.FLASHSALE_GRAFANA_NEON_DATASOURCE_UID }}
      TF_VAR_loki_datasource_uid: ${{ vars.FLASHSALE_GRAFANA_LOKI_DATASOURCE_UID }}
      TF_VAR_tempo_datasource_uid: ${{ vars.FLASHSALE_GRAFANA_TEMPO_DATASOURCE_UID }}
      TF_VAR_prometheus_datasource_uid: ${{ vars.FLASHSALE_GRAFANA_PROMETHEUS_DATASOURCE_UID || 'prometheus' }}
      TF_VAR_flashsale_namespace: ${{ vars.FLASHSALE_NAMESPACE || 'flashsales' }}
      TF_VAR_processing_sla_minutes: ${{ vars.FLASHSALE_GRAFANA_PROCESSING_SLA_MINUTES || '5' }}
      TF_VAR_grafana_folder_title: ${{ vars.FLASHSALE_GRAFANA_FOLDER_TITLE || 'Flashsale' }}
      TF_VAR_grafana_folder_uid: ${{ vars.FLASHSALE_GRAFANA_FOLDER_UID || 'flashsale-folder' }}
      TF_VAR_upstash_redis_budget: ${{ vars.FLASHSALE_UPSTASH_REDIS_BUDGET || '20' }}
      TF_VAR_aiven_api_token_parameter_name: ${{ vars.FLASHSALE_AIVEN_API_TOKEN_PARAMETER_NAME || '/avien/api_token' }}
      TF_VAR_aiven_project_name: ${{ vars.FLASHSALE_AIVEN_PROJECT_NAME || 'flashsale' }}
      TF_VAR_aiven_org_id_parameter_name: ${{ vars.FLASHSALE_AIVEN_ORG_ID_PARAMETER_NAME || '/avien/org_id' }}
      TF_VAR_aiven_kafka_service_name: ${{ vars.FLASHSALE_AIVEN_KAFKA_SERVICE_NAME || 'flashsale-kafka' }}
      TF_VAR_aiven_kafka_plan: ${{ vars.FLASHSALE_AIVEN_KAFKA_PLAN || 'free-0' }}
      TF_VAR_aiven_kafka_cloud_name: ${{ vars.FLASHSALE_AIVEN_KAFKA_CLOUD_NAME || '' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/flashsale

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate required secrets
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "NEON_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=flashsales/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Validate flashsale Terraform prerequisites
        run: |
          set -euo pipefail

          if [ -z "${TF_VAR_neon_api_key:-}" ]; then
            echo "NEON_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${GRAFANA_URL:-}" ] && [ -z "${TF_VAR_grafana_url:-}" ]; then
            echo "GRAFANA_URL variable is missing"
            exit 1
          fi
          if [ -z "${GRAFANA_AUTH:-}" ] && [ -z "${TF_VAR_grafana_auth:-}" ]; then
            echo "GRAFANA_AUTH secret is missing"
            exit 1
          fi
          if [ -z "${FLASHSALE_GRAFANA_NEON_DATASOURCE_UID:-}" ] && [ -z "${TF_VAR_neon_datasource_uid:-}" ]; then
            echo "FLASHSALE_GRAFANA_NEON_DATASOURCE_UID variable is missing"
            exit 1
          fi
          if [ -z "${FLASHSALE_GRAFANA_LOKI_DATASOURCE_UID:-}" ] && [ -z "${TF_VAR_loki_datasource_uid:-}" ]; then
            echo "FLASHSALE_GRAFANA_LOKI_DATASOURCE_UID variable is missing"
            exit 1
          fi
          if [ -z "${FLASHSALE_GRAFANA_TEMPO_DATASOURCE_UID:-}" ] && [ -z "${TF_VAR_tempo_datasource_uid:-}" ]; then
            echo "FLASHSALE_GRAFANA_TEMPO_DATASOURCE_UID variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_aiven_api_token:-}" ]; then
            aws ssm get-parameter \
              --name "${TF_VAR_aiven_api_token_parameter_name:-/avien/api_token}" \
              --with-decryption >/dev/null
          fi
          if [ -z "${TF_VAR_aiven_project_parent_id:-}" ]; then
            aws ssm get-parameter \
              --name "${TF_VAR_aiven_org_id_parameter_name:-/avien/org_id}" \
              --with-decryption >/dev/null
          fi

      - name: Resolve Aiven Kafka cloud
        run: |
          set -euo pipefail

          auth_header() {
            printf 'Authorization: aivenv1 %s' "$1"
          }

          api_get() {
            local output_file="$1"
            shift
            curl -sS \
              -o "$output_file" \
              -w '%{http_code}' \
              -H "$(auth_header "$api_token")" \
              "$@"
          }

          api_token="${TF_VAR_aiven_api_token:-}"
          if [ -z "$api_token" ]; then
            api_token="$(
              aws ssm get-parameter \
                --name "${TF_VAR_aiven_api_token_parameter_name:-/avien/api_token}" \
                --with-decryption \
                --query 'Parameter.Value' \
                --output text
            )"
          fi

          target_project="${TF_VAR_aiven_project_name}"
          explicit_cloud="${TF_VAR_aiven_kafka_cloud_name:-}"
          probe_project=""

          project_status="$(api_get /tmp/aiven-target-project.json "https://api.aiven.io/v1/project/${target_project}")"
          if [ "$project_status" = "200" ]; then
            probe_project="$target_project"
          elif [ "$project_status" = "404" ]; then
            echo "Aiven project ${target_project} does not exist yet; resolving Kafka cloud before project creation."
          else
            message="$(jq -r '.message // (.errors[0].message // empty)' /tmp/aiven-target-project.json 2>/dev/null || true)"
            if [ -n "$message" ]; then
              echo "Unable to inspect Aiven project ${target_project}: ${message}"
            else
              echo "Unable to inspect Aiven project ${target_project}: HTTP ${project_status}"
            fi
            exit 1
          fi

          if [ -z "$probe_project" ]; then
            projects_status="$(api_get /tmp/aiven-projects.json "https://api.aiven.io/v1/project")"
            if [ "$projects_status" != "200" ]; then
              message="$(jq -r '.message // (.errors[0].message // empty)' /tmp/aiven-projects.json 2>/dev/null || true)"
              if [ -n "$message" ]; then
                echo "Unable to list accessible Aiven projects: ${message}"
              else
                echo "Unable to list accessible Aiven projects: HTTP ${projects_status}"
              fi
              exit 1
            fi

            probe_project="$(
              jq -r '.projects[].project_name // empty' /tmp/aiven-projects.json \
                | awk 'NF { print; exit }'
            )"

            if [ -n "$probe_project" ]; then
              echo "Using existing Aiven project ${probe_project} to probe Kafka plan availability."
            else
              echo "No existing Aiven projects are accessible; falling back to the global cloud catalog."
            fi
          fi

          if [ -n "$explicit_cloud" ]; then
            candidate_clouds="$explicit_cloud"
            echo "Validating explicitly configured Aiven Kafka cloud: ${explicit_cloud}"
          else
            if [ -n "$probe_project" ]; then
              clouds_status="$(api_get /tmp/aiven-clouds.json "https://api.aiven.io/v1/project/${probe_project}/clouds")"
            else
              clouds_status="$(api_get /tmp/aiven-clouds.json "https://api.aiven.io/v1/clouds")"
            fi

            if [ "$clouds_status" != "200" ]; then
              message="$(jq -r '.message // (.errors[0].message // empty)' /tmp/aiven-clouds.json 2>/dev/null || true)"
              if [ -n "$message" ]; then
                echo "Unable to list candidate Aiven clouds: ${message}"
              else
                echo "Unable to list candidate Aiven clouds: HTTP ${clouds_status}"
              fi
              exit 1
            fi

            candidate_clouds="$(
              jq -r '.. | .cloud_name? // empty' /tmp/aiven-clouds.json \
                | awk 'NF && !seen[$0]++' \
                | awk '
                    function rank(cloud) {
                      if (cloud ~ /^aws-/) return 0
                      if (cloud ~ /^google-/) return 1
                      if (cloud ~ /^azure-/) return 2
                      return 99
                    }
                    { print rank($0) ":" $0 }
                  ' \
                | sort -t: -k1,1n -k2,2 \
                | cut -d: -f2-
            )"

            if [ -z "$candidate_clouds" ]; then
              echo "No candidate Aiven clouds were returned"
              exit 1
            fi
          fi

          resolved_cloud=""
          while IFS= read -r cloud; do
            [ -n "$cloud" ] || continue
            if [ -z "$probe_project" ]; then
              resolved_cloud="$cloud"
              echo "Selected Aiven cloud ${cloud} from the global catalog without project-scoped plan validation."
              break
            fi

            status_code="$(api_get /tmp/aiven-plan-cloud.json "https://api.aiven.io/v1/project/${probe_project}/pricing/service-types/kafka/plans/${TF_VAR_aiven_kafka_plan}/clouds/${cloud}")"

            if [ "$status_code" = "200" ]; then
              resolved_cloud="$cloud"
              break
            fi

            message="$(jq -r '.message // (.errors[0].message // empty)' /tmp/aiven-plan-cloud.json 2>/dev/null || true)"
            if [ -n "$message" ]; then
              echo "Skipping Aiven cloud ${cloud}: ${message}"
            else
              echo "Skipping Aiven cloud ${cloud}: pricing lookup returned HTTP ${status_code}"
            fi
          done < <(printf '%s\n' "$candidate_clouds")

          if [ -z "$resolved_cloud" ]; then
            echo "Unable to find an Aiven cloud that supports plan ${TF_VAR_aiven_kafka_plan} for project ${target_project}"
            printf 'Candidates checked:\n%s\n' "$candidate_clouds"
            exit 1
          fi

          echo "Resolved Aiven Kafka cloud: ${resolved_cloud}"
          echo "TF_VAR_aiven_kafka_cloud_name=${resolved_cloud}" >> "$GITHUB_ENV"

      - name: Import existing project into Terraform state
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_NAME: flashsales
        run: |
          if terraform state show module.neon.neon_project.flashsales >/dev/null 2>&1; then
            echo "module.neon.neon_project.flashsales already managed by Terraform"
            exit 0
          fi

          existing_project_id=$(curl -fsS \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects?search=${PROJECT_NAME}&limit=100" \
            | jq -r --arg name "$PROJECT_NAME" '
                [.projects[] | select(.name == $name)]
                | sort_by(.created_at)
                | last
                | .id // empty
              ')

          if [ -z "$existing_project_id" ]; then
            echo "No existing Neon project named ${PROJECT_NAME} was found; Terraform will create it"
            exit 0
          fi

          echo "Importing existing Neon project ${PROJECT_NAME} with id ${existing_project_id}"
          terraform import -input=false module.neon.neon_project.flashsales "$existing_project_id"

      - name: Migrate legacy Grafana dashboard state addresses
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: |
          set -euo pipefail

          has_state_address() {
            local address="$1"
            local state_list
            state_list="$(terraform state list 2>/dev/null || true)"
            printf '%s\n' "$state_list" | grep -Fxq -- "$address"
          }

          move_state() {
            local from="$1"
            local to="$2"

            if has_state_address "$to"; then
              echo "${to} already exists in Terraform state"
              return 0
            fi

            if has_state_address "$from"; then
              echo "Moving Terraform state ${from} -> ${to}"
              terraform state mv "$from" "$to"
              return 0
            fi

            echo "No legacy state found for ${from}"
          }

          move_state \
            "module.grafana_dashboards.grafana_folder.flashsale" \
            "grafana_folder.flashsale"
          move_state \
            "module.grafana_dashboards.grafana_dashboard.flashsale_order_service" \
            "grafana_dashboard.flashsale_order_service"
          move_state \
            "module.grafana_dashboards.grafana_dashboard.flashsale_product_service" \
            "grafana_dashboard.flashsale_product_service"
          move_state \
            "module.grafana_dashboards.grafana_dashboard.flashsale_terminalization_queue_health" \
            "grafana_dashboard.flashsale_terminalization_queue_health"
          move_state \
            "module.grafana_dashboards.grafana_dashboard.flashsale_terminalization_outcomes" \
            "grafana_dashboard.flashsale_terminalization_outcomes"
          move_state \
            "module.grafana_dashboards.grafana_dashboard.flashsale_distributed_traces" \
            "grafana_dashboard.flashsale_distributed_traces"

      - name: Import existing Grafana folder into Terraform state
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: |
          if terraform state show grafana_folder.flashsale >/dev/null 2>&1; then
            echo "grafana_folder.flashsale already managed by Terraform"
            exit 0
          fi

          echo "Importing existing Grafana folder ${TF_VAR_grafana_folder_uid}"
          terraform import -input=false grafana_folder.flashsale "${TF_VAR_grafana_folder_uid}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Detect whether project is already managed
        id: precheck_project
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: |
          if terraform state show module.neon.neon_project.flashsales >/dev/null 2>&1; then
            echo "project_preexisting=true" >> "$GITHUB_OUTPUT"
          else
            echo "project_preexisting=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: terraform apply -auto-approve -input=false

      - name: Roll back newly-created Neon project if apply flow failed
        if: ${{ failure() && (inputs.action == 'apply' || inputs.action == '') && steps.precheck_project.outputs.project_preexisting == 'false' }}
        run: |
          echo "Apply flow failed and project was not previously managed. Rolling back module.neon.neon_project.flashsales..."
          terraform destroy -target module.neon.neon_project.flashsales -auto-approve -input=false || true

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -input=false

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        uses: ./.github/actions/notify-discord
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          aws_region: ${{ vars.AWS_REGION }}
          discord_webhook_ssm_name: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          workflow_name: Terraform Flashsale Resources
          needs_json: ${{ toJson(needs) }}
