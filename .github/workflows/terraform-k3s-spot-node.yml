name: Terraform K3s Spot Node

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
      cluster_name:
        description: Logical cluster name
        required: false
        default: openhands-k3s
        type: string
      network_name:
        description: Name suffix for the low-cost VPC stack
        required: false
        default: spot-network
        type: string
      node_group_name:
        description: Name suffix for the spot worker group
        required: false
        default: spot-worker
        type: string
      vpc_cidr:
        description: CIDR block for the VPC
        required: false
        default: 10.44.0.0/16
        type: string
      public_subnet_count:
        description: Number of public subnets to create
        required: false
        default: "2"
        type: string
      instance_types:
        description: Comma-separated instance types, ordered by preference
        required: false
        default: t3.small,t3a.small
        type: string
      key_name:
        description: Optional EC2 key pair name
        required: false
        type: string
      allowed_ssh_cidrs:
        description: Comma-separated SSH source CIDRs
        required: false
        type: string
      trusted_cluster_cidrs:
        description: Comma-separated trusted CIDRs that must reach the worker for k3s node-to-node traffic and monitoring
        required: false
        type: string
      extra_k3s_agent_args:
        description: Optional raw k3s agent args appended to INSTALL_K3S_EXEC
        required: false
        type: string
      k3s_server_url:
        description: Existing k3s server URL, for example https://server:6443. When Tailscale bootstrap is enabled, prefer the control-plane Tailscale URL.
        required: false
        type: string
      tailscale_enabled:
        description: Auto-join the provisioned spot worker to Tailscale during bootstrap and prefer its Tailscale IP for k3s node registration
        required: false
        default: true
        type: boolean
      tailscale_advertise_tags:
        description: Optional comma-separated Tailscale tags advertised by the spot worker
        required: false
        type: string
      reconcile_grafana_monitoring:
        description: Reconcile the cluster-level grafana k8s monitoring Helm release after a successful apply
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  network:
    if: ${{ inputs.action != 'destroy' }}
    uses: ./.github/workflows/terraform-k3s-spot-network-internal.yml
    with:
      action: ${{ inputs.action }}
      cluster_name: ${{ inputs.cluster_name }}
      network_name: ${{ inputs.network_name }}
      vpc_cidr: ${{ inputs.vpc_cidr }}
      public_subnet_count: ${{ inputs.public_subnet_count }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

  node:
    if: ${{ inputs.action != 'destroy' }}
    needs: network
    uses: ./.github/workflows/terraform-k3s-spot-node-internal.yml
    with:
      action: ${{ inputs.action }}
      cluster_name: ${{ inputs.cluster_name }}
      node_group_name: ${{ inputs.node_group_name }}
      instance_types: ${{ inputs.instance_types }}
      key_name: ${{ inputs.key_name }}
      allowed_ssh_cidrs: ${{ inputs.allowed_ssh_cidrs }}
      trusted_cluster_cidrs: ${{ inputs.trusted_cluster_cidrs }}
      extra_k3s_agent_args: ${{ inputs.extra_k3s_agent_args }}
      k3s_server_url: ${{ inputs.k3s_server_url }}
      tailscale_enabled: ${{ inputs.tailscale_enabled }}
      tailscale_advertise_tags: ${{ inputs.tailscale_advertise_tags }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      K3S_SERVER_TOKEN: ${{ secrets.K3S_SERVER_TOKEN }}
      TS_SPOT_AUTH_KEY: ${{ secrets.TS_SPOT_AUTH_KEY }}

  grafana-monitoring:
    name: Reconcile Grafana K8s Monitoring
    if: ${{ inputs.action == 'apply' && inputs.reconcile_grafana_monitoring && needs.node.result == 'success' }}
    needs:
      - node
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    env:
      MONITORING_NAMESPACE: monitoring
      K3S_SERVER_URL_TAILSCALE: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
      TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate cluster access settings
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi

          if [ -z "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            echo "K3S_SERVER_URL_TAILSCALE is not set; kubeconfig server will be used as-is."
            exit 0
          fi

          API_HOST="${K3S_SERVER_URL_TAILSCALE#https://}"
          API_HOST="${API_HOST#http://}"
          API_HOST="${API_HOST%%:*}"

          case "$API_HOST" in
            100.*)
              if [ -z "${TS_OAUTH_CLIENT_ID:-}" ] || [ -z "${TS_OAUTH_SECRET:-}" ] || [ -z "${TS_CI_TAGS:-}" ]; then
                echo "K3S_SERVER_URL_TAILSCALE points to Tailscale address ${K3S_SERVER_URL_TAILSCALE}, but TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET / TS_CI_TAGS are not all configured."
                exit 1
              fi
              ;;
          esac

      - name: Connect Tailscale for private k3s access
        if: ${{ env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '' && env.TS_CI_TAGS != '' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TS_CI_TAGS }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if [ -n "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            CLUSTER_NAME="$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')"
            echo "Overriding kubeconfig server for cluster ${CLUSTER_NAME}: ${K3S_SERVER_URL_TAILSCALE}"
            kubectl config set-cluster "$CLUSTER_NAME" --server="$K3S_SERVER_URL_TAILSCALE"
          fi

          kubectl version --client
          kubectl get nodes

      - name: Materialize monitoring values
        env:
          GRAFANA_MONITORING_VALUES: ${{ secrets.GRAFANA_MONITORING_VALUES }}
        run: |
          set -euo pipefail
          if [ -n "${GRAFANA_MONITORING_VALUES:-}" ]; then
            printf '%s\n' "$GRAFANA_MONITORING_VALUES" > /tmp/grafana-k8s-monitoring-values.yaml
          elif [ -f secrets/grafana-k8s-monitoring-values.yaml ]; then
            cp secrets/grafana-k8s-monitoring-values.yaml /tmp/grafana-k8s-monitoring-values.yaml
          else
            echo "Missing Grafana monitoring values. Set GRAFANA_MONITORING_VALUES secret or commit secrets/grafana-k8s-monitoring-values.yaml."
            exit 1
          fi

      - name: Reconcile grafana k8s monitoring
        run: |
          set -euo pipefail
          kubectl create namespace "$MONITORING_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install grafana-k8s-monitoring grafana/k8s-monitoring \
            -n "$MONITORING_NAMESPACE" \
            --wait \
            --timeout 10m \
            -f /tmp/grafana-k8s-monitoring-values.yaml

      - name: Show monitoring status
        run: |
          kubectl get pods -n "$MONITORING_NAMESPACE" -o wide

  destroy_node:
    if: ${{ inputs.action == 'destroy' }}
    uses: ./.github/workflows/terraform-k3s-spot-node-internal.yml
    with:
      action: destroy
      cluster_name: ${{ inputs.cluster_name }}
      node_group_name: ${{ inputs.node_group_name }}
      instance_types: ${{ inputs.instance_types }}
      key_name: ${{ inputs.key_name }}
      allowed_ssh_cidrs: ${{ inputs.allowed_ssh_cidrs }}
      trusted_cluster_cidrs: ${{ inputs.trusted_cluster_cidrs }}
      extra_k3s_agent_args: ${{ inputs.extra_k3s_agent_args }}
      k3s_server_url: ${{ inputs.k3s_server_url }}
      tailscale_enabled: ${{ inputs.tailscale_enabled }}
      tailscale_advertise_tags: ${{ inputs.tailscale_advertise_tags }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      K3S_SERVER_TOKEN: ${{ secrets.K3S_SERVER_TOKEN }}
      TS_SPOT_AUTH_KEY: ${{ secrets.TS_SPOT_AUTH_KEY }}

  destroy_network:
    if: ${{ inputs.action == 'destroy' }}
    needs: destroy_node
    uses: ./.github/workflows/terraform-k3s-spot-network-internal.yml
    with:
      action: destroy
      cluster_name: ${{ inputs.cluster_name }}
      network_name: ${{ inputs.network_name }}
      vpc_cidr: ${{ inputs.vpc_cidr }}
      public_subnet_count: ${{ inputs.public_subnet_count }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
