name: Terraform K3s Spot Node

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
      cluster_name:
        description: Logical cluster name
        required: false
        default: openhands-k3s
        type: string
      network_name:
        description: Name suffix for the low-cost VPC stack
        required: false
        default: spot-network
        type: string
      node_group_name:
        description: Name suffix for the spot worker group
        required: false
        default: spot-worker
        type: string
      vpc_cidr:
        description: CIDR block for the VPC
        required: false
        default: 10.44.0.0/16
        type: string
      public_subnet_count:
        description: Number of public subnets to create
        required: false
        default: "2"
        type: string
      instance_types:
        description: Comma-separated instance types, ordered by preference
        required: false
        default: t3.small,t3a.small
        type: string
      root_volume_size_gb:
        description: Root EBS volume size in GiB for the spot worker
        required: false
        default: "15"
        type: string
      desired_capacity:
        description: Desired number of spot workers to maintain
        required: false
        default: "1"
        type: string
      min_size:
        description: Minimum number of spot workers to maintain
        required: false
        default: "1"
        type: string
      max_size:
        description: Maximum number of spot workers the ASG may launch
        required: false
        default: "1"
        type: string
      key_name:
        description: Optional EC2 key pair name
        required: false
        type: string
      allowed_ssh_cidrs:
        description: Comma-separated SSH source CIDRs
        required: false
        type: string
      trusted_cluster_cidrs:
        description: Comma-separated trusted CIDRs that must reach the worker for k3s node-to-node traffic and monitoring
        required: false
        type: string
      extra_k3s_agent_args:
        description: Optional raw k3s agent args appended to INSTALL_K3S_EXEC
        required: false
        type: string
      k3s_server_url:
        description: Existing k3s server URL, for example https://server:6443. When Tailscale bootstrap is enabled, prefer the control-plane Tailscale URL.
        required: false
        type: string
      tailscale_enabled:
        description: Auto-join the provisioned spot worker to Tailscale during bootstrap and prefer its Tailscale IP for k3s node registration
        required: false
        default: true
        type: boolean
      tailscale_advertise_tags:
        description: Optional comma-separated Tailscale tags advertised by the spot worker
        required: false
        type: string
      reconcile_grafana_monitoring:
        description: Reconcile the cluster-level grafana k8s monitoring Helm release after a successful apply
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  network:
    if: ${{ inputs.action != 'destroy' }}
    uses: ./.github/workflows/terraform-k3s-spot-network-internal.yml
    with:
      action: ${{ inputs.action }}
      cluster_name: ${{ inputs.cluster_name }}
      network_name: ${{ inputs.network_name }}
      vpc_cidr: ${{ inputs.vpc_cidr }}
      public_subnet_count: ${{ inputs.public_subnet_count }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

  node:
    if: ${{ inputs.action != 'destroy' }}
    needs: network
    uses: ./.github/workflows/terraform-k3s-spot-node-internal.yml
    with:
      action: ${{ inputs.action }}
      cluster_name: ${{ inputs.cluster_name }}
      node_group_name: ${{ inputs.node_group_name }}
      instance_types: ${{ inputs.instance_types }}
      root_volume_size_gb: ${{ inputs.root_volume_size_gb }}
      desired_capacity: ${{ inputs.desired_capacity }}
      min_size: ${{ inputs.min_size }}
      max_size: ${{ inputs.max_size }}
      key_name: ${{ inputs.key_name }}
      allowed_ssh_cidrs: ${{ inputs.allowed_ssh_cidrs }}
      trusted_cluster_cidrs: ${{ inputs.trusted_cluster_cidrs }}
      extra_k3s_agent_args: ${{ inputs.extra_k3s_agent_args }}
      k3s_server_url: ${{ inputs.k3s_server_url }}
      tailscale_enabled: ${{ inputs.tailscale_enabled }}
      tailscale_advertise_tags: ${{ inputs.tailscale_advertise_tags }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      K3S_SERVER_TOKEN: ${{ secrets.K3S_SERVER_TOKEN }}
      TS_SPOT_AUTH_KEY: ${{ secrets.TS_SPOT_AUTH_KEY }}

  verify-spot-node:
    name: Verify Spot Node Joined K3s
    if: ${{ inputs.action == 'apply' && needs.node.result == 'success' }}
    needs:
      - node
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      CLUSTER_NAME: ${{ inputs.cluster_name }}
      NODE_GROUP_NAME: ${{ inputs.node_group_name }}
      K3S_SERVER_URL_TAILSCALE: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
      TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      DESIRED_CAPACITY: ${{ inputs.desired_capacity }}
      MIN_SIZE: ${{ inputs.min_size }}
      MAX_SIZE: ${{ inputs.max_size }}
      RECYCLE_UNREADY_NODE: "true"

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate cluster access settings
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi

          if [ -z "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            echo "K3S_SERVER_URL_TAILSCALE is not set; kubeconfig server will be used as-is."
            exit 0
          fi

          if [ -z "${DESIRED_CAPACITY:-}" ] || [ -z "${MIN_SIZE:-}" ] || [ -z "${MAX_SIZE:-}" ]; then
            echo "Desired/min/max capacity inputs are missing"
            exit 1
          fi

          API_HOST="${K3S_SERVER_URL_TAILSCALE#https://}"
          API_HOST="${API_HOST#http://}"
          API_HOST="${API_HOST%%:*}"

          case "$API_HOST" in
            100.*)
              if [ -z "${TS_OAUTH_CLIENT_ID:-}" ] || [ -z "${TS_OAUTH_SECRET:-}" ] || [ -z "${TS_CI_TAGS:-}" ]; then
                echo "K3S_SERVER_URL_TAILSCALE points to Tailscale address ${K3S_SERVER_URL_TAILSCALE}, but TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET / TS_CI_TAGS are not all configured."
                exit 1
              fi
              ;;
          esac

      - name: Connect Tailscale for private k3s access
        if: ${{ env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '' && env.TS_CI_TAGS != '' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TS_CI_TAGS }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if [ -n "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            CURRENT_CLUSTER="$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')"
            kubectl config set-cluster "$CURRENT_CLUSTER" --server="$K3S_SERVER_URL_TAILSCALE"
          fi

          kubectl get nodes -o wide

      - name: Verify spot node joined and is Ready
        run: |
          set -euo pipefail
          asg_name="${CLUSTER_NAME}-${NODE_GROUP_NAME}"
          desired_capacity="${DESIRED_CAPACITY}"
          recycled_unready_node="false"
          asg_ready_once="false"
          total_attempts=48
          refill_attempts=48

          get_inservice_instance_ids() {
            aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg_name" \
              --region "$AWS_REGION" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text
          }

          build_node_prefixes() {
            local instance_id
            local private_dns
            node_prefixes=""
            for instance_id in "${instance_id_array[@]}"; do
              [ -z "$instance_id" ] && continue
              [ "$instance_id" = "None" ] && continue
              private_dns="$(aws ec2 describe-instances \
                --instance-ids "$instance_id" \
                --region "$AWS_REGION" \
                --query 'Reservations[0].Instances[0].PrivateDnsName' \
                --output text)"
              node_prefixes="${node_prefixes}${private_dns%%.*}"$'\n'
            done
          }

          echo "Waiting for ${desired_capacity} spot instance(s) from ASG ${asg_name} to register as Ready k3s node(s)..."

          for attempt in $(seq 1 "$total_attempts"); do
            instance_ids="$(get_inservice_instance_ids)"
            instance_count="$(printf '%s\n' "$instance_ids" | awk 'NF && $1 != "None"{count++} END{print count+0}')"
            read -r -a instance_id_array <<< "$instance_ids"
            build_node_prefixes

            if [ "$instance_count" -ge "$desired_capacity" ]; then
              if [ "$asg_ready_once" = "false" ]; then
                echo "ASG ${asg_name} reached ${instance_count}/${desired_capacity} InService instance(s)."
                echo "Current InService instances:"
                printf '%s\n' "${instance_id_array[@]}"
                asg_ready_once="true"
              fi
            else
              echo "Attempt ${attempt}/${total_attempts}: ASG has ${instance_count}/${desired_capacity} InService instance(s) so far."
            fi

            ready_matches=0
            unready_matches=0
            first_unready_node=""
            while IFS= read -r node_prefix; do
              [ -z "$node_prefix" ] && continue
              matched_node="$(kubectl get nodes -o name | sed 's|^node/||' | grep "^${node_prefix}" | head -n1 || true)"
              if [ -n "${matched_node:-}" ]; then
                ready_status="$(kubectl get node "$matched_node" -o jsonpath='{range .status.conditions[?(@.type=="Ready")]}{.status}{end}')"
                if [ "$ready_status" = "True" ]; then
                  ready_matches=$((ready_matches + 1))
                  continue
                fi
                unready_matches=$((unready_matches + 1))
                if [ -z "$first_unready_node" ]; then
                  first_unready_node="$matched_node"
                fi
                echo "Matched node ${matched_node}, but Ready=${ready_status:-unknown}"
              fi
            done <<< "$node_prefixes"

            if [ "$ready_matches" -ge "$desired_capacity" ]; then
              echo "Ready nodes matched: ${ready_matches}/${desired_capacity}"
              kubectl get nodes -o wide
              exit 0
            fi

            if [ "${RECYCLE_UNREADY_NODE}" = "true" ] && [ "$recycled_unready_node" = "false" ] && [ "$instance_count" -ge "$desired_capacity" ] && [ "$unready_matches" -gt 0 ]; then
              echo "Detected ${unready_matches} matched worker node(s) that are registered but not Ready. Recycling ASG instance(s) once."
              if [ -n "$first_unready_node" ]; then
                kubectl describe node "$first_unready_node" || true
              fi

              for instance_id in "${instance_id_array[@]}"; do
                echo "Terminating stale ASG instance ${instance_id} to force replacement"
                aws autoscaling terminate-instance-in-auto-scaling-group \
                  --instance-id "$instance_id" \
                  --should-decrement-desired-capacity false \
                  --region "$AWS_REGION"
              done

              recycled_unready_node="true"
              instance_ids=""
              for refill_attempt in $(seq 1 "$refill_attempts"); do
                instance_ids="$(get_inservice_instance_ids)"
                instance_count="$(printf '%s\n' "$instance_ids" | awk 'NF && $1 != "None"{count++} END{print count+0}')"
                if [ "$instance_count" -ge "$desired_capacity" ]; then
                  break
                fi
                echo "Replacement wait ${refill_attempt}/${refill_attempts}: ASG has ${instance_count}/${desired_capacity} InService instance(s)."
                sleep 10
              done

              read -r -a instance_id_array <<< "$instance_ids"
              build_node_prefixes

              echo "Replacement InService instances:"
              printf '%s\n' "${instance_id_array[@]}"
              sleep 20
              continue
            fi

            echo "Attempt ${attempt}/${total_attempts}: only ${ready_matches}/${desired_capacity} worker node(s) are Ready yet."
            kubectl get nodes -o wide || true
            sleep 10
          done

          echo "Spot ASG ${asg_name} never produced ${desired_capacity} Ready k3s node(s)."
          kubectl get nodes -o wide || true
          exit 1

  grafana-monitoring:
    name: Reconcile Grafana K8s Monitoring
    if: ${{ inputs.action == 'apply' && inputs.reconcile_grafana_monitoring && needs.verify-spot-node.result == 'success' }}
    needs:
      - verify-spot-node
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    env:
      MONITORING_NAMESPACE: monitoring
      K3S_SERVER_URL_TAILSCALE: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
      TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate cluster access settings
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi

          if [ -z "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            echo "K3S_SERVER_URL_TAILSCALE is not set; kubeconfig server will be used as-is."
            exit 0
          fi

          API_HOST="${K3S_SERVER_URL_TAILSCALE#https://}"
          API_HOST="${API_HOST#http://}"
          API_HOST="${API_HOST%%:*}"

          case "$API_HOST" in
            100.*)
              if [ -z "${TS_OAUTH_CLIENT_ID:-}" ] || [ -z "${TS_OAUTH_SECRET:-}" ] || [ -z "${TS_CI_TAGS:-}" ]; then
                echo "K3S_SERVER_URL_TAILSCALE points to Tailscale address ${K3S_SERVER_URL_TAILSCALE}, but TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET / TS_CI_TAGS are not all configured."
                exit 1
              fi
              ;;
          esac

      - name: Connect Tailscale for private k3s access
        if: ${{ env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '' && env.TS_CI_TAGS != '' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TS_CI_TAGS }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if [ -n "${K3S_SERVER_URL_TAILSCALE:-}" ]; then
            CLUSTER_NAME="$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')"
            echo "Overriding kubeconfig server for cluster ${CLUSTER_NAME}: ${K3S_SERVER_URL_TAILSCALE}"
            kubectl config set-cluster "$CLUSTER_NAME" --server="$K3S_SERVER_URL_TAILSCALE"
          fi

          kubectl version --client
          kubectl get nodes

      - name: Materialize monitoring values
        env:
          GRAFANA_MONITORING_VALUES: ${{ secrets.GRAFANA_MONITORING_VALUES }}
        run: |
          set -euo pipefail
          if [ -n "${GRAFANA_MONITORING_VALUES:-}" ]; then
            printf '%s\n' "$GRAFANA_MONITORING_VALUES" > /tmp/grafana-k8s-monitoring-values.yaml
          elif [ -f secrets/grafana-k8s-monitoring-values.yaml ]; then
            cp secrets/grafana-k8s-monitoring-values.yaml /tmp/grafana-k8s-monitoring-values.yaml
          else
            echo "Missing Grafana monitoring values. Set GRAFANA_MONITORING_VALUES secret or commit secrets/grafana-k8s-monitoring-values.yaml."
            exit 1
          fi

      - name: Resolve monitoring namespace
        run: |
          set -euo pipefail
          release_namespace="$(helm list -A | awk '$1 == "grafana-k8s-monitoring" {print $2; exit}')"
          if [ -n "${release_namespace:-}" ]; then
            echo "Using existing grafana-k8s-monitoring release namespace: ${release_namespace}"
            echo "MONITORING_NAMESPACE=${release_namespace}" >> "$GITHUB_ENV"
          else
            echo "No existing grafana-k8s-monitoring release found; using default namespace ${MONITORING_NAMESPACE}"
          fi

      - name: Recover stuck monitoring release
        run: |
          set -euo pipefail
          current_status="$(helm status grafana-k8s-monitoring -n "$MONITORING_NAMESPACE" -o json 2>/dev/null | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("info", {}).get("status", ""))' || true)"
          if [ -z "${current_status:-}" ]; then
            echo "No existing grafana-k8s-monitoring release status found; nothing to recover."
            exit 0
          fi

          case "$current_status" in
            pending-*)
              echo "grafana-k8s-monitoring is stuck in status ${current_status}; attempting rollback to last deployed revision."
              rollback_revision="$(helm history grafana-k8s-monitoring -n "$MONITORING_NAMESPACE" -o json | python3 -c 'import json,sys; hist=json.load(sys.stdin); deployed=[r for r in hist if r.get("status")=="deployed"]; print(deployed[-1]["revision"] if deployed else "")')"
              if [ -z "${rollback_revision:-}" ]; then
                echo "No deployed revision found to roll back to."
                exit 1
              fi
              helm rollback grafana-k8s-monitoring "$rollback_revision" -n "$MONITORING_NAMESPACE" --wait --timeout 10m
              ;;
            *)
              echo "grafana-k8s-monitoring status is ${current_status}; no recovery needed."
              ;;
          esac

      - name: Reconcile grafana k8s monitoring
        run: |
          set -euo pipefail
          kubectl create namespace "$MONITORING_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install grafana-k8s-monitoring grafana/k8s-monitoring \
            -n "$MONITORING_NAMESPACE" \
            --wait \
            --timeout 10m \
            -f /tmp/grafana-k8s-monitoring-values.yaml

      - name: Show monitoring status
        run: |
          kubectl get pods -n "$MONITORING_NAMESPACE" -o wide

  destroy_node:
    if: ${{ inputs.action == 'destroy' }}
    uses: ./.github/workflows/terraform-k3s-spot-node-internal.yml
    with:
      action: destroy
      cluster_name: ${{ inputs.cluster_name }}
      node_group_name: ${{ inputs.node_group_name }}
      instance_types: ${{ inputs.instance_types }}
      key_name: ${{ inputs.key_name }}
      allowed_ssh_cidrs: ${{ inputs.allowed_ssh_cidrs }}
      trusted_cluster_cidrs: ${{ inputs.trusted_cluster_cidrs }}
      extra_k3s_agent_args: ${{ inputs.extra_k3s_agent_args }}
      k3s_server_url: ${{ inputs.k3s_server_url }}
      tailscale_enabled: ${{ inputs.tailscale_enabled }}
      tailscale_advertise_tags: ${{ inputs.tailscale_advertise_tags }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      K3S_SERVER_TOKEN: ${{ secrets.K3S_SERVER_TOKEN }}
      TS_SPOT_AUTH_KEY: ${{ secrets.TS_SPOT_AUTH_KEY }}

  destroy_network:
    if: ${{ inputs.action == 'destroy' }}
    needs: destroy_node
    uses: ./.github/workflows/terraform-k3s-spot-network-internal.yml
    with:
      action: destroy
      cluster_name: ${{ inputs.cluster_name }}
      network_name: ${{ inputs.network_name }}
      vpc_cidr: ${{ inputs.vpc_cidr }}
      public_subnet_count: ${{ inputs.public_subnet_count }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

  notify-discord:
    name: Notify Discord
    needs:
      - network
      - node
      - verify-spot-node
      - destroy_node
      - destroy_network
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Terraform K3s Spot Node
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
