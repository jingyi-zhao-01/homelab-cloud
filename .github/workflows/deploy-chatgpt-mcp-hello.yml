name: Deploy ChatGPT MCP Hello

on:
  push:
    branches:
      - main
    paths:
      - 'apps/chatgpt-mcp-hello/**'
      - 'charts/chatgpt-mcp-hello/**'
      - '.github/actions/setup-private-k3s-access/**'
      - '.github/workflows/deploy-chatgpt-mcp-hello.yml'
  workflow_dispatch:

concurrency:
  group: deploy-chatgpt-mcp-hello-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: chatgpt-mcp
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/chatgpt-mcp-hello
  IMAGE_TAG: ${{ github.sha }}
  TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

jobs:
  deploy:
    name: Build and deploy ChatGPT MCP hello
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homelab-cloud
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PULL_USERNAME }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_REPOSITORY:latest" \
            -t "$IMAGE_REPOSITORY:$IMAGE_TAG" \
            apps/chatgpt-mcp-hello
          docker push "$IMAGE_REPOSITORY:latest"
          docker push "$IMAGE_REPOSITORY:$IMAGE_TAG"

      - name: Configure private k3s access
        uses: ./.github/actions/setup-private-k3s-access
        with:
          kube_config_data: ${{ secrets.KUBE_CONFIG_DATA }}
          k3s_server_url_tailscale: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
          ts_oauth_client_id: ${{ env.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ env.TS_OAUTH_SECRET }}
          ts_ci_tags: ${{ env.TS_CI_TAGS }}

      - name: Prepare Kubernetes prerequisites
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: bash .github/scripts/ensure-k8s-prereqs.sh

      - name: Deploy via Helm
        run: |
          helm upgrade --install chatgpt-mcp-hello \
            --dependency-update \
            charts/chatgpt-mcp-hello/ \
            -n "$NAMESPACE" \
            --create-namespace \
            --set namespaceOverride="$NAMESPACE" \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG"

      - name: Wait for deployments
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/chatgpt-mcp-hello --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/chatgpt-mcp-hello-tunnel --timeout=300s

      - name: Show deployment status
        run: kubectl -n "$NAMESPACE" get all

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n "$NAMESPACE" get pods -o wide || true
          kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl -n "$NAMESPACE" logs deploy/chatgpt-mcp-hello --tail=200 || true
          kubectl -n "$NAMESPACE" logs deploy/chatgpt-mcp-hello-tunnel --tail=200 || true
