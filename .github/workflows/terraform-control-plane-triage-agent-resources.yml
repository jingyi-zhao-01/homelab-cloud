name: Terraform Control Plane Triage Agent Resources

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  push:
    branches:
      - main
    paths:
      - "terraform/control-plane-triage-agent/**"
      - ".github/workflows/terraform-control-plane-triage-agent-resources.yml"

concurrency:
  group: control-plane-triage-agent-resources
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || inputs.action }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_ssm_path_prefix: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_SSM_PATH_PREFIX || 'control-plane-triage-agent/prod' }}
      TF_VAR_github_token_parameter_name: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_GITHUB_TOKEN_PARAMETER_NAME || '/codex/GITHUB_ACCESS_TOKEN' }}
      TF_VAR_discord_webhook_url_parameter_name: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_DISCORD_WEBHOOK_URL_PARAMETER_NAME || vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
      TF_VAR_openrouter_api_key_parameter_name: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_OPENROUTER_API_KEY_PARAMETER_NAME || '/codex/OPEN_ROUTER_API_KEY' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/control-plane-triage-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_openrouter_api_key_parameter_name:-}" ]; then
            echo "CONTROL_PLANE_TRIAGE_AGENT_OPENROUTER_API_KEY_PARAMETER_NAME variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_github_token_parameter_name:-}" ]; then
            echo "CONTROL_PLANE_TRIAGE_AGENT_GITHUB_TOKEN_PARAMETER_NAME variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_discord_webhook_url_parameter_name:-}" ]; then
            echo "CONTROL_PLANE_TRIAGE_AGENT_DISCORD_WEBHOOK_URL_PARAMETER_NAME variable is missing"
            exit 1
          fi

      - name: Terraform shared flow
        uses: ./.github/actions/terraform-run
        with:
          working_directory: terraform/control-plane-triage-agent
          backend_bucket: ${{ env.TF_STATE_BUCKET }}
          backend_key: control-plane-triage-agent/resources/terraform.tfstate
          aws_region: ${{ env.AWS_REGION }}
          action: ${{ github.event_name == 'push' && 'apply' || inputs.action }}

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        uses: ./.github/actions/notify-discord
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          aws_region: ${{ vars.AWS_REGION }}
          discord_webhook_ssm_name: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          workflow_name: Terraform Control Plane Triage Agent Resources
          needs_json: ${{ toJson(needs) }}
