name: Terraform Control Plane Triage Agent Resources

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  push:
    branches:
      - main
    paths:
      - "terraform/control-plane-triage-agent/**"
      - ".github/workflows/terraform-control-plane-triage-agent-resources.yml"

concurrency:
  group: control-plane-triage-agent-resources
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || inputs.action }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_ssm_path_prefix: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_SSM_PATH_PREFIX || 'control-plane-triage-agent/prod' }}
      TF_VAR_openrouter_api_key_parameter_name: ${{ vars.CONTROL_PLANE_TRIAGE_AGENT_OPENROUTER_API_KEY_PARAMETER_NAME || '/openrouter/OPEN_ROUTER_API_KEY' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/control-plane-triage-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required configuration
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${TF_VAR_openrouter_api_key_parameter_name:-}" ]; then
            echo "CONTROL_PLANE_TRIAGE_AGENT_OPENROUTER_API_KEY_PARAMETER_NAME variable is missing"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=control-plane-triage-agent/resources/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: ${{ github.event_name == 'push' || inputs.action == 'apply' }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform Destroy
        if: ${{ github.event_name != 'push' && inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -input=false

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Terraform Control Plane Triage Agent Resources
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
