name: Flashsales Deploy Post

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: flashsales-deploy-post-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # runtime-consistency:
  #   uses: ./.github/workflows/flashsales-consistency.yml
  #   secrets: inherit

  perf-concurrency-suite:
    uses: ./.github/workflows/flashsales-perf-concurrency-suite.yml
    secrets: inherit

  notify-discord:
    name: Notify Discord
    needs:
      - perf-concurrency-suite
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Flashsales Deploy Post
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
