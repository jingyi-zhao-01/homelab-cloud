name: Provision Neon Database

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  # Called by deploy-remote-vps.yml as a reusable workflow (always applies)
  workflow_call:
    secrets:
      NEON_API_KEY:
        required: true
      KUBE_CONFIG_DATA:
        required: true

  push:
    branches:
      - main
    paths:
      - 'terraform/neon/**'
      - '.github/workflows/neon-provision.yml'

concurrency:
  group: neon-provision
  cancel-in-progress: false   # never cancel infra runs mid-flight

env:
  TF_VAR_k8s_namespace: ${{ vars.K8S_NAMESPACE || 'flashsales' }}

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/neon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Restore tfstate from previous run so Terraform knows what already exists.
      # continue-on-error so the first run (no prior state) doesn't fail.
      - name: Restore tfstate artifact
        uses: actions/download-artifact@v4
        with:
          name: neon-tfstate
          path: terraform/neon
        continue-on-error: true

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # Override kubeconfig_path for CI (default value points to secrets/ dir which doesn't exist here)
      - name: Set CI variable overrides
        run: |
          cat > ci.auto.tfvars <<EOF
          kubeconfig_path = "$HOME/.kube/config"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ (inputs.action == 'apply' || inputs.action == '') && inputs.action != 'destroy' }}
        env:
          TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        env:
          TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
        run: terraform destroy -auto-approve

      # Always upload the latest tfstate so the next run can restore it.
      - name: Save tfstate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-tfstate
          path: terraform/neon/terraform.tfstate
          overwrite: true
          retention-days: 90
