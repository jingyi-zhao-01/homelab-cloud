name: Terraform Provision

# This workflow provisions Neon
# and syncs Neon credentials into AWS SSM Parameter Store.
# Design goal: idempotent apply with safe rollback when partial failures happen.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  # Called by deploy-remote-vps.yml as a reusable workflow (always applies)
  workflow_call:
    inputs:
      action:
        description: "Terraform action to run when called as reusable workflow"
        required: false
        default: apply
        type: string
    secrets:
      NEON_API_KEY:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      TF_STATE_BUCKET:
        required: true

  push:
    branches:
      - main
    paths:
      - 'terraform/neon/**'
      - 'terraform/ssm/**'
      - '.github/workflows/terraform-provision.yml'

concurrency:
  # Serialize runs to avoid tfstate races between concurrent workflow executions.
  group: neon-provision
  cancel-in-progress: false   # never cancel infra runs mid-flight

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    env:
      # Export as TF_VAR_* so every terraform command (plan/apply/import/destroy)
      # gets the Neon API key without repeating step-level env blocks.
      TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
      # AWS credentials are needed for the S3 backend.
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/neon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "NEON_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=flashsales/neon/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Remove retired Kubernetes secret from Terraform state
        run: |
          if terraform state list | grep -qx 'kubernetes_secret_v1.neon_credentials'; then
            terraform state rm kubernetes_secret_v1.neon_credentials
          else
            echo "kubernetes_secret_v1.neon_credentials is not present in Terraform state"
          fi

      # If the Neon project already exists but Terraform state was lost, import it
      # before apply so we do not create another flashsales project on every deploy.
      # When multiple projects share the same name, prefer the most recently created
      # one so we keep following the latest live deployment path.
      - name: Import existing project into Terraform state
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_NAME: flashsales
        run: |
          if terraform state show neon_project.flashsales >/dev/null 2>&1; then
            echo "neon_project.flashsales already managed by Terraform"
            exit 0
          fi

          existing_project_id=$(curl -fsS \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects?search=${PROJECT_NAME}&limit=100" \
            | jq -r --arg name "$PROJECT_NAME" '
                [.projects[] | select(.name == $name)]
                | sort_by(.created_at)
                | last
                | .id // empty
              ')

          if [ -z "$existing_project_id" ]; then
            echo "No existing Neon project named ${PROJECT_NAME} was found; Terraform will create it"
            exit 0
          fi

          echo "Importing existing Neon project ${PROJECT_NAME} with id ${existing_project_id}"
          terraform import -input=false neon_project.flashsales "$existing_project_id"

      - name: Terraform Plan
        run: terraform plan -input=false

      # Capture whether neon_project.flashsales was already managed before apply.
      # Used by rollback step to avoid deleting long-lived existing projects.
      - name: Detect whether project is already managed
        id: precheck_project
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: |
          if terraform state show neon_project.flashsales >/dev/null 2>&1; then
            echo "project_preexisting=true" >> "$GITHUB_OUTPUT"
          else
            echo "project_preexisting=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        run: terraform apply -auto-approve -input=false

      - name: Sync Neon credentials to SSM via Terraform
        if: ${{ inputs.action == 'apply' || inputs.action == '' }}
        env:
          SSM_PATH_PREFIX: flashsales/prod
        run: |
          DB_USER=$(terraform output -raw database_user)
          DB_PASSWORD=$(terraform output -raw database_password)
          DB_NAME=$(terraform output -raw database_name)
          DATABASE_URL=$(terraform output -raw database_url)

          cd ../ssm

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=flashsales/ssm/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

          terraform apply -auto-approve -input=false \
            -var="aws_region=${AWS_REGION}" \
            -var="ssm_path_prefix=${SSM_PATH_PREFIX}" \
            -var="postgres_user=${DB_USER}" \
            -var="postgres_password=${DB_PASSWORD}" \
            -var="postgres_db=${DB_NAME}" \
            -var="database_url=${DATABASE_URL}"

      # Transaction-like safeguard:
      # if apply path fails and this run created a brand-new project,
      # clean it up so we do not leave orphan Neon projects behind.
      - name: Roll back newly-created Neon project if apply flow failed
        if: ${{ failure() && (inputs.action == 'apply' || inputs.action == '') && steps.precheck_project.outputs.project_preexisting == 'false' }}
        run: |
          echo "Apply flow failed and project was not previously managed. Rolling back neon_project.flashsales..."
          terraform destroy -target neon_project.flashsales -auto-approve -input=false || true

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -input=false

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Terraform Provision
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
