name: Flashsales Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'flashsale/**'
      - 'charts/flashsales/**'
      - '.github/workflows/flashsales-deploy-pre.yml'
      - '.github/workflows/flashsales-deploy.yml'
      - '.github/workflows/flashsales-deploy-post.yml'
      - '.github/workflows/flashsales-consistency.yml'
      - '.github/workflows/flashsales-perf-concurrency-suite.yml'

concurrency:
  group: flashsales-deploy-${{ github.sha }}
  cancel-in-progress: true

env:
  NAMESPACE: ${{ vars.K8S_NAMESPACE || 'flashsales' }}
  RELEASE: ${{ vars.HELM_RELEASE || 'flashsales' }}
  CHART_PATH: ${{ vars.HELM_CHART_PATH || 'charts/flashsales' }}
  TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

permissions:
  contents: read
  packages: write

jobs:
  predeploy:
    name: Predeploy Gates
    uses: ./.github/workflows/flashsales-deploy-pre.yml
    secrets: inherit

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - predeploy
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: flashsale/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:latest

  deploy:
    name: Deploy to k3s
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    needs:
      - build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Connect Tailscale for private k3s access
        if: ${{ env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '' && env.TS_CI_TAGS != '' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ env.TS_CI_TAGS }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          K8S_API_SERVER_URL_OVERRIDE: ${{ vars.K8S_API_SERVER_URL_OVERRIDE }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client

          if [ -n "${K8S_API_SERVER_URL_OVERRIDE:-}" ]; then
            CLUSTER_NAME="$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')"
            echo "Overriding kubeconfig server for cluster ${CLUSTER_NAME}: ${K8S_API_SERVER_URL_OVERRIDE}"
            kubectl config set-cluster "$CLUSTER_NAME" --server="$K8S_API_SERVER_URL_OVERRIDE"
          fi

          API_SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Target API server: $API_SERVER"

          API_HOSTPORT="${API_SERVER#https://}"
          API_HOSTPORT="${API_HOSTPORT#http://}"
          API_HOST="${API_HOSTPORT%%/*}"
          API_HOST="${API_HOST%%:*}"
          API_PORT="${API_HOSTPORT##*:}"
          if [ "$API_PORT" = "$API_HOSTPORT" ]; then
            API_PORT="443"
          fi
          echo "Resolved API host: $API_HOST"
          echo "Resolved API port: $API_PORT"

          for attempt in 1 2 3 4 5; do
            echo "Checking Kubernetes API reachability (attempt ${attempt}/5)"
            if kubectl --request-timeout=20s get nodes; then
              echo "Kubernetes API is reachable"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Kubernetes API remained unreachable after 5 attempts"
              echo "This usually indicates transient network reachability issues from GitHub Actions to the public k3s API endpoint."
              echo "Capturing final network diagnostics for ${API_HOST}:${API_PORT}"
              getent ahostsv4 "$API_HOST" || true
              getent ahostsv6 "$API_HOST" || true
              curl -vk --connect-timeout 10 --max-time 20 "${API_SERVER}/version" || true
              exit 1
            fi

            echo "kubectl get nodes failed; retrying in 15 seconds"
            curl -sk --connect-timeout 5 --max-time 10 "${API_SERVER}/version" >/dev/null || true
            sleep 15
          done

      - name: Create GHCR image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_USERNAME or GHCR_PULL_TOKEN is missing"
            echo "Add both secrets so k3s can pull private GHCR images"
            exit 1
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify GHCR pull credentials can read deployed images
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}"

          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io \
            --username "$GHCR_PULL_USERNAME" \
            --password-stdin

          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-user-service:"$IMAGE_TAG" >/dev/null
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-product-service:"$IMAGE_TAG" >/dev/null
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-order-service:"$IMAGE_TAG" >/dev/null

      - name: Deploy Helm release
        run: |
          IMAGE_TAG="${{ github.sha }}"
          helm upgrade --install "$RELEASE" "$CHART_PATH" \
            -n "$NAMESPACE" \
            --create-namespace \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set userService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-user-service \
            --set userService.image.tag="$IMAGE_TAG" \
            --set userService.image.pullPolicy=IfNotPresent \
            --set productService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-product-service \
            --set productService.image.tag="$IMAGE_TAG" \
            --set productService.image.pullPolicy=IfNotPresent \
            --set orderService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-order-service \
            --set orderService.image.tag="$IMAGE_TAG" \
            --set orderService.image.pullPolicy=IfNotPresent

      - name: Wait for rollouts
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-user-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-product-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-order-service --timeout=300s

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 80 || true
          kubectl describe deploy flashsales-user-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-product-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-order-service -n "$NAMESPACE" || true

      - name: Show final status
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl get svc -n "$NAMESPACE"

  postdeploy:
    name: Postdeploy Runtime Gates
    needs:
      - deploy
    if: ${{ needs.deploy.result == 'success' }}
    uses: ./.github/workflows/flashsales-deploy-post.yml
    secrets: inherit
