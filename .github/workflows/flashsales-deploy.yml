name: Flashsales Deploy

on:
  workflow_dispatch:
    inputs:
      flashsale_source_sha:
        description: Optional flashsale source SHA to deploy.
        required: false
        type: string
        default: ''
      flashsale_image_tag:
        description: Optional flashsale image tag to deploy.
        required: false
        type: string
        default: ''
  repository_dispatch:
    types:
      - flashsale-release-ready
  pull_request:
    types:
      - opened
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'application/flashsale'
      - 'application/flashsale/**'
      - '.gitmodules'
      - '.github/actions/setup-private-k3s-access/**'
      - 'charts/flashsales/**'
      - '.github/workflows/flashsales-deploy.yml'

concurrency:
  group: flashsales-deploy-${{ github.sha }}
  cancel-in-progress: true

env:
  NAMESPACE: ${{ vars.K8S_NAMESPACE || 'flashsales' }}
  RELEASE: ${{ vars.HELM_RELEASE || 'flashsales' }}
  CHART_PATH: ${{ vars.HELM_CHART_PATH || 'charts/flashsales' }}
  FLASHSALE_SOURCE_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.flashsale_ref || github.ref_name }}
  TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to k3s
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Resolve flashsale submodule to dispatched revision
        if: ${{ github.event_name == 'repository_dispatch' }}
        env:
          FLASHSALE_SHA: ${{ github.event.client_payload.flashsale_sha }}
          FLASHSALE_FETCH_REF: ${{ github.event.client_payload.flashsale_fetch_ref }}
        run: |
          set -euo pipefail
          if [ -z "${FLASHSALE_SHA:-}" ]; then
            echo "repository_dispatch did not include flashsale_sha"
            exit 1
          fi

          if [ -n "${FLASHSALE_FETCH_REF:-}" ]; then
            git -C application/flashsale fetch --depth=1 origin "$FLASHSALE_FETCH_REF"
          else
            git -C application/flashsale fetch --depth=1 origin "$FLASHSALE_SHA"
          fi
          git -C application/flashsale checkout --detach "$FLASHSALE_SHA"

      - name: Resolve flashsale submodule to workflow_dispatch revision
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.flashsale_source_sha != '' }}
        env:
          FLASHSALE_SHA: ${{ github.event.inputs.flashsale_source_sha }}
        run: |
          set -euo pipefail
          git -C application/flashsale fetch --depth=1 origin "$FLASHSALE_SHA"
          git -C application/flashsale checkout --detach "$FLASHSALE_SHA"

      - name: Resolve flashsale deploy metadata
        id: flashsale_metadata
        env:
          DISPATCH_IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.flashsale_image_tag || '' }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.flashsale_image_tag || '' }}
        run: |
          set -euo pipefail

          flashsale_sha="$(git -C application/flashsale rev-parse HEAD)"
          flashsale_ref="${FLASHSALE_SOURCE_REF}"
          flashsale_image_tag="${DISPATCH_IMAGE_TAG:-}"

          if [ -z "$flashsale_image_tag" ]; then
            flashsale_image_tag="${MANUAL_IMAGE_TAG:-}"
          fi

          if [ -z "$flashsale_image_tag" ]; then
            flashsale_image_tag="$flashsale_sha"
          fi

          {
            echo "flashsale_sha=$flashsale_sha"
            echo "flashsale_ref=$flashsale_ref"
            echo "flashsale_image_tag=$flashsale_image_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Show flashsale source metadata
        run: |
          echo "Flashsale source ref: ${{ steps.flashsale_metadata.outputs.flashsale_ref }}"
          echo "Flashsale source sha: ${{ steps.flashsale_metadata.outputs.flashsale_sha }}"
          echo "Flashsale image tag: ${{ steps.flashsale_metadata.outputs.flashsale_image_tag }}"
          git -C application/flashsale rev-parse HEAD

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release renderer dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Render flashsale release overlay
        run: |
          python3 .github/scripts/render_flashsale_release.py \
            application/flashsale/release/flashsale-release.yaml \
            /tmp/flashsale-release-values.yaml
          cat /tmp/flashsale-release-values.yaml

      - name: Configure private k3s access
        uses: ./.github/actions/setup-private-k3s-access
        with:
          kube_config_data: ${{ secrets.KUBE_CONFIG_DATA }}
          k3s_server_url_tailscale: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
          ts_oauth_client_id: ${{ env.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ env.TS_OAUTH_SECRET }}
          ts_ci_tags: ${{ env.TS_CI_TAGS }}

      - name: Create GHCR image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_USERNAME or GHCR_PULL_TOKEN is missing"
            echo "Add both secrets so k3s can pull private GHCR images"
            exit 1
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Detect External Secrets Operator CRDs
        run: |
          set -euo pipefail

          if kubectl api-versions | grep -qx 'external-secrets.io/v1beta1'; then
            echo "External Secrets Operator API external-secrets.io/v1beta1 detected"
            echo "HELM_EXTERNAL_SECRETS_ARGS=--set externalSecrets.apiVersion=external-secrets.io/v1beta1" >> "$GITHUB_ENV"
          elif kubectl api-versions | grep -qx 'external-secrets.io/v1'; then
            echo "External Secrets Operator API external-secrets.io/v1 detected"
            echo "HELM_EXTERNAL_SECRETS_ARGS=--set externalSecrets.apiVersion=external-secrets.io/v1" >> "$GITHUB_ENV"
          else
            echo "External Secrets Operator API not detected; disabling ExternalSecret resources for this deploy"
            echo "HELM_EXTERNAL_SECRETS_ARGS=--set externalSecrets.enabled=false --set externalSecrets.store.create=false" >> "$GITHUB_ENV"
          fi

      - name: Verify GHCR pull credentials can read deployed images
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.flashsale_metadata.outputs.flashsale_image_tag }}"

          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io \
            --username "$GHCR_PULL_USERNAME" \
            --password-stdin

          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-user-service:"$IMAGE_TAG" >/dev/null
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-product-service:"$IMAGE_TAG" >/dev/null
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/flashsales-order-service:"$IMAGE_TAG" >/dev/null

      - name: Deploy Helm release
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.flashsale_metadata.outputs.flashsale_image_tag }}"
          helm upgrade --install "$RELEASE" "$CHART_PATH" \
            --dependency-update \
            -n "$NAMESPACE" \
            --create-namespace \
            -f "$CHART_PATH/values.yaml" \
            -f /tmp/flashsale-release-values.yaml \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set userService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-user-service \
            --set userService.image.tag="$IMAGE_TAG" \
            --set userService.image.pullPolicy=IfNotPresent \
            --set productService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-product-service \
            --set productService.image.tag="$IMAGE_TAG" \
            --set productService.image.pullPolicy=IfNotPresent \
            --set orderService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-order-service \
            --set orderService.image.tag="$IMAGE_TAG" \
            --set orderService.image.pullPolicy=IfNotPresent \
            ${HELM_EXTERNAL_SECRETS_ARGS:-}

      - name: Refresh runtime secrets
        run: |
          set -euo pipefail

          if kubectl -n "$NAMESPACE" get externalsecret flashsales-postgres-auth >/dev/null 2>&1; then
            kubectl -n "$NAMESPACE" annotate externalsecret flashsales-postgres-auth \
              force-sync="$(date +%s)" \
              --overwrite
          fi

          for attempt in $(seq 1 30); do
            protocol="$(
              kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth \
                -o jsonpath='{.data.KAFKA_SECURITY_PROTOCOL}' 2>/dev/null \
                | base64 --decode 2>/dev/null || true
            )"
            kafka_ca_cert="$(
              kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth \
                -o jsonpath='{.data.KAFKA_CA_CERT}' 2>/dev/null \
                | base64 --decode 2>/dev/null || true
            )"

            if [ "$protocol" = "SASL_SSL" ] && printf '%s' "$kafka_ca_cert" | grep -q 'BEGIN CERTIFICATE'; then
              echo "Kafka runtime secret has SASL_SSL and KAFKA_CA_CERT"
              break
            fi

            echo "Waiting for Kafka runtime secret to sync SASL_SSL + CA cert (attempt ${attempt}/30, protocol=${protocol:-missing})..."
            sleep 5
          done

          protocol="$(
            kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth \
              -o jsonpath='{.data.KAFKA_SECURITY_PROTOCOL}' 2>/dev/null \
              | base64 --decode 2>/dev/null || true
          )"
          kafka_ca_cert="$(
            kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth \
              -o jsonpath='{.data.KAFKA_CA_CERT}' 2>/dev/null \
              | base64 --decode 2>/dev/null || true
          )"
          if [ "$protocol" != "SASL_SSL" ] || ! printf '%s' "$kafka_ca_cert" | grep -q 'BEGIN CERTIFICATE'; then
            echo "Kafka runtime secret must contain SASL_SSL and a PEM KAFKA_CA_CERT after deploy; protocol=${protocol:-missing}"
            echo "ExternalSecret status:"
            kubectl -n "$NAMESPACE" get externalsecret flashsales-postgres-auth -o yaml || true
            exit 1
          fi

          kubectl -n "$NAMESPACE" rollout restart deploy/flashsales-order-service
          kubectl -n "$NAMESPACE" rollout restart deploy/flashsales-order-worker

      - name: Wait for rollouts
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-user-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-product-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-order-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-order-worker --timeout=300s

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 80 || true
          kubectl describe deploy flashsales-user-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-product-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-order-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-order-worker -n "$NAMESPACE" || true

      - name: Show final status
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl get svc -n "$NAMESPACE"

  notify-discord:
    name: Notify Discord
    needs:
      - deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Flashsales Deploy
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
