name: Terraform LeetCode Intelligence Resources

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

  push:
    branches:
      - main
    paths:
      - "terraform/leetcode-intelligence/**"
      - ".github/workflows/terraform-leetcode-intelligence-resources.yml"

concurrency:
  group: leetcode-intelligence-resources
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID_SSM_NAME: ${{ vars.VERCEL_ORG_ID_SSM_NAME || '/vercel/VERCEL_ORG_ID' }}
  VERCEL_TOKEN_SSM_NAME: ${{ vars.VERCEL_TOKEN_SSM_NAME || '/vercel/VERCEL_TOKEN' }}
  VERCEL_PROJECT_ID_SSM_NAME: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_PROJECT_ID_SSM_NAME || '/leetcode-intelligence/VERCEL_PROJECT_ID' }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || inputs.action }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_ssm_path_prefix: ${{ vars.LEETCODE_INTELLIGENCE_SSM_PATH_PREFIX || 'leetcode-intelligence' }}
      TF_VAR_upstash_redis_database_name: ${{ vars.LEETCODE_INTELLIGENCE_UPSTASH_DATABASE_NAME || 'leetcode-intelligence-rate-limit' }}
      TF_VAR_upstash_redis_primary_region: ${{ vars.LEETCODE_INTELLIGENCE_UPSTASH_PRIMARY_REGION || 'us-west-1' }}
      TF_VAR_upstash_redis_budget: ${{ vars.LEETCODE_INTELLIGENCE_UPSTASH_REDIS_BUDGET || '20' }}
      TF_VAR_vercel_firewall_enabled: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_FIREWALL_ENABLED || 'true' }}
      TF_VAR_vercel_firewall_ai_bots_enabled: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_FIREWALL_AI_BOTS_ENABLED || 'true' }}
      TF_VAR_vercel_firewall_ai_bots_action: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_FIREWALL_AI_BOTS_ACTION || 'deny' }}
      TF_VAR_vercel_firewall_bot_protection_enabled: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_FIREWALL_BOT_PROTECTION_ENABLED || 'true' }}
      TF_VAR_vercel_firewall_bot_protection_action: ${{ vars.LEETCODE_INTELLIGENCE_VERCEL_FIREWALL_BOT_PROTECTION_ACTION || 'challenge' }}
      TF_VAR_non_admin_rate_limit_max_requests: ${{ vars.LEETCODE_INTELLIGENCE_NON_ADMIN_RATE_LIMIT_MAX_REQUESTS || '120' }}
      TF_VAR_non_admin_rate_limit_window_seconds: ${{ vars.LEETCODE_INTELLIGENCE_NON_ADMIN_RATE_LIMIT_WINDOW_SECONDS || '60' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ fromJson(toJson(vars)).AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    defaults:
      run:
        working-directory: terraform/leetcode-intelligence

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required configuration
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is missing"
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION variable is missing"
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_ORG_ID_SSM_NAME variable is missing"
            exit 1
          fi
          if [ -z "${VERCEL_TOKEN_SSM_NAME:-}" ]; then
            echo "VERCEL_TOKEN_SSM_NAME variable is missing"
            exit 1
          fi
          if [ -z "${VERCEL_PROJECT_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_PROJECT_ID_SSM_NAME variable is missing"
            exit 1
          fi

      - name: Resolve Vercel firewall configuration from AWS SSM
        run: |
          set -euo pipefail

          fetch_ssm() {
            local logical_name="$1"
            local parameter_name="$2"
            local value

            if ! value="$(
              aws ssm get-parameter \
                --name "$parameter_name" \
                --with-decryption \
                --query 'Parameter.Value' \
                --output text \
                --region "$AWS_REGION"
            )"; then
              echo "Failed to resolve $logical_name from SSM parameter $parameter_name" >&2
              exit 1
            fi

            if [ -z "$value" ] || [ "$value" = "None" ]; then
              echo "Resolved empty value for $logical_name from SSM parameter $parameter_name" >&2
              exit 1
            fi

            printf '%s\n' "$value"
          }

          mask_value() {
            echo "::add-mask::$1"
          }

          vercel_org_id="$(fetch_ssm "VERCEL_ORG_ID" "$VERCEL_ORG_ID_SSM_NAME")"
          vercel_token="$(fetch_ssm "VERCEL_TOKEN" "$VERCEL_TOKEN_SSM_NAME")"
          vercel_project_id="$(fetch_ssm "VERCEL_PROJECT_ID" "$VERCEL_PROJECT_ID_SSM_NAME")"

          mask_value "$vercel_org_id"
          mask_value "$vercel_token"
          mask_value "$vercel_project_id"

          {
            echo "TF_VAR_vercel_team_id=$vercel_org_id"
            echo "TF_VAR_vercel_api_token=$vercel_token"
            echo "TF_VAR_vercel_project_id=$vercel_project_id"
          } >> "$GITHUB_ENV"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=leetcode-intelligence/resources/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: ${{ github.event_name == 'push' || inputs.action == 'apply' }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform Destroy
        if: ${{ github.event_name != 'push' && inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -input=false

  notify-discord:
    name: Notify Discord
    needs:
      - terraform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Terraform LeetCode Intelligence Resources
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
