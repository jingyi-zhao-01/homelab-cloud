name: Flashsales Perf Concurrency Suite

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: perf-concurrency-suite-${{ github.ref }}
  cancel-in-progress: true

env:
  NAMESPACE: ${{ vars.K8S_NAMESPACE || 'flashsales' }}

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Perf Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify target services
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" get svc flashsales-user-service
          kubectl -n "$NAMESPACE" get svc flashsales-product-service
          kubectl -n "$NAMESPACE" get svc flashsales-order-service

  smoke:
    name: Concurrency Smoke (10 TPS)
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pause 5 minutes before smoke
        run: sleep 300

      - name: Run concurrency smoke (10 TPS)
        run: |
          set -euo pipefail
          KUBECONFIG_PATH="$HOME/.kube/config" NAMESPACE="$NAMESPACE" make concurrency-smoke

  idempotency-lite:
    name: Idempotency Lite Replay
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ needs.smoke.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Run idempotency lite replay
        run: |
          set -euo pipefail
          KUBECONFIG_PATH="$HOME/.kube/config" NAMESPACE="$NAMESPACE" make concurrency-idempotency-lite
