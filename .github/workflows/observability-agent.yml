name: Observability Agent

on:
  workflow_run:
    workflows:
      - "Flashsales Perf Concurrency Suite"
    types:
      - completed
  workflow_dispatch:
    inputs:
      mode:
        description: "Agent mode (continuous or single-run)"
        required: true
        default: "single-run"
        type: choice
        options:
          - continuous
          - single-run
      run_id:
        description: "Workflow run ID to analyze (optional, defaults to recent failures)"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-observability-agent:
    name: Run Observability Agent
    runs-on: ${{ fromJson(vars.K8S_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}

    # Only run when workflow_run is completed with failure
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'failure')

    environment: observability-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openhands-sdk boto3 requests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch Grafana token from SSM
        id: ssm-grafana
        env:
          GRAFANA_TOKEN_SSM_PATH: ${{ vars.GRAFANA_TOKEN_SSM_PATH || '/codex/grafana-service-account-token' }}
        run: |
          VAL=$(aws ssm get-parameter --name "$GRAFANA_TOKEN_SSM_PATH" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true)
          echo "value=${VAL}" >> "$GITHUB_OUTPUT"

      - name: Fetch LLM API key from SSM
        id: ssm-llm
        env:
          LLM_API_KEY_SSM_PATH: ${{ vars.LLM_API_KEY_SSM_PATH || '/flashsales/prod/llm-api-key' }}
        run: |
          VAL=$(aws ssm get-parameter --name "$LLM_API_KEY_SSM_PATH" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true)
          echo "value=${VAL}" >> "$GITHUB_OUTPUT"

      - name: Validate required configuration
        run: |
          set -euo pipefail
          MISSING=""
          
          if [ -z "${GRAFANA_URL:-}" ];  then MISSING="$MISSING GRAFANA_URL"; fi
          if [ -z "${AWS_REGION:-}" ];   then MISSING="$MISSING AWS_REGION"; fi
          
          if [ -n "$MISSING" ]; then
            echo "Missing required configuration:$MISSING"
            exit 1
          fi
          echo "All required configuration present"
        env:
          GRAFANA_URL: ${{ vars.GRAFANA_URL }}
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Run Observability Agent
        env:
          # --- Required ---
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          GRAFANA_URL: ${{ vars.GRAFANA_URL }}

          # --- SSM paths ---
          GRAFANA_TOKEN_SSM_PATH: ${{ vars.GRAFANA_TOKEN_SSM_PATH || '/codex/grafana-service-account-token' }}
          LLM_API_KEY_SSM_PATH: ${{ vars.LLM_API_KEY_SSM_PATH || '/flashsales/prod/llm-api-key' }}

          # --- LLM settings (non-secret) ---
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}

          # --- Agent behaviour ---
          CHECK_INTERVAL: ${{ github.event.inputs.mode == 'continuous' && vars.CHECK_INTERVAL || '60' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '12' }}
          WORKFLOW_NAME: ${{ vars.WORKFLOW_NAME || 'flashsales-perf-concurrency-suite.yml' }}

          # --- Logging ---
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT || 'json' }}

        run: |
          MODE="${{ github.event.inputs.mode || 'single-run' }}"
          echo "=== Observability Agent: ${MODE} mode ==="

          if [ "${MODE}" = "continuous" ]; then
            DURATION="${{ vars.CONTINUOUS_RUN_DURATION || '7200' }}"
            echo "Running for ${DURATION}s (set CONTINUOUS_RUN_DURATION to change)"
            timeout "$DURATION" python flashsale/perf/python/observability_agent.py || true
          else
            python flashsale/perf/python/observability_agent.py || true
          fi

          echo "=== Agent finished ==="
