name: Deploy LeetCode Intelligence to leetcode-intelligence Namespace

on:
  push:
    branches:
      - main
    paths:
      - 'charts/leetcode-intelligence/**'
      - '.github/workflows/deploy-leetcode-intelligence.yml'
  workflow_dispatch:

concurrency:
  group: deploy-leetcode-intelligence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NAMESPACE: leetcode-intelligence

jobs:
  deploy:
    name: Deploy to leetcode-intelligence Namespace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homelab-cloud
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl get nodes

      - name: Prepare Kubernetes prerequisites
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: bash .github/scripts/ensure-k8s-prereqs.sh

      - name: Print deployment image digest
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          image="ghcr.io/${{ github.repository_owner }}/leetcode-intelligence-service:latest"

          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io \
            --username "$GHCR_PULL_USERNAME" \
            --password-stdin

          digest=$(docker manifest inspect --verbose "$image" | jq -r '
            if type == "array" then
              (.[0].Descriptor.digest // .[0].digest // empty)
            else
              (.Descriptor.digest // .digest // empty)
            end
          ')

          if [ -z "$digest" ]; then
            echo "Failed to resolve image digest for $image"
            exit 1
          fi

          echo "Deploying image: $image"
          echo "Deploying digest: $digest"

      - name: Deploy intelligence service via Helm
        run: |
          helm upgrade --install leetcode-intelligence \
            charts/leetcode-intelligence/ \
            -n "$NAMESPACE" \
            --create-namespace \
            --set namespaceOverride="$NAMESPACE" \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/leetcode-intelligence-service \
            --set image.tag=latest \
            --set image.pullPolicy=Always

      - name: Wait for ExternalSecret to sync
        run: |
          for i in $(seq 1 30); do
            if kubectl -n "$NAMESPACE" get secret leetcode-intelligence-service-secrets >/dev/null 2>&1 && \
               [ -n "$(kubectl -n "$NAMESPACE" get secret leetcode-intelligence-service-secrets -o jsonpath='{.data.OPEN_ROUTER_API_KEY}' 2>/dev/null)" ]; then
              echo "Secret leetcode-intelligence-service-secrets contains OPEN_ROUTER_API_KEY"
              break
            fi
            echo "Waiting for ExternalSecret to sync OPEN_ROUTER_API_KEY (attempt $i/30)..."
            sleep 5
          done

          kubectl -n "$NAMESPACE" get secret leetcode-intelligence-service-secrets >/dev/null 2>&1 && \
          [ -n "$(kubectl -n "$NAMESPACE" get secret leetcode-intelligence-service-secrets -o jsonpath='{.data.OPEN_ROUTER_API_KEY}' 2>/dev/null)" ] || {
            echo "Secret did not contain OPEN_ROUTER_API_KEY in time. ExternalSecret details:"
            kubectl -n "$NAMESPACE" get externalsecret leetcode-intelligence-service-secrets -o yaml || true
            echo "Current secret keys:"
            kubectl -n "$NAMESPACE" get secret leetcode-intelligence-service-secrets -o json | jq -r '.data | keys[]' || true
            exit 1
          }

      - name: Restart deployment after secret sync
        run: |
          kubectl -n "$NAMESPACE" rollout restart deployment \
            -l app.kubernetes.io/instance=leetcode-intelligence,app.kubernetes.io/name=leetcode-intelligence

      - name: Wait for deployment
        run: |
          deploys=$(kubectl -n "$NAMESPACE" get deploy \
            -l app.kubernetes.io/instance=leetcode-intelligence,app.kubernetes.io/name=leetcode-intelligence \
            -o jsonpath='{.items[*].metadata.name}')

          if [ -z "$deploys" ]; then
            echo "No deployments found for leetcode-intelligence release"
            kubectl -n "$NAMESPACE" get deploy -o wide || true
            exit 1
          fi

          for d in $deploys; do
            echo "Waiting rollout for deployment/$d"
            kubectl -n "$NAMESPACE" rollout status "deploy/$d" --timeout=300s || {
              echo "Rollout failed for deployment/$d, dumping diagnostics"
              kubectl -n "$NAMESPACE" get pods -o wide || true
              kubectl -n "$NAMESPACE" describe deploy "$d" || true
              kubectl -n "$NAMESPACE" logs "deploy/$d" --tail=200 || true
              exit 1
            }
          done

      - name: Show deployment status
        run: |
          kubectl -n "$NAMESPACE" get all

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl get deploy -n "$NAMESPACE" -o wide || true

  notify-discord:
    name: Notify Discord
    needs:
      - deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        uses: ./.github/actions/notify-discord
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          aws_region: ${{ vars.AWS_REGION }}
          discord_webhook_ssm_name: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          workflow_name: Deploy LeetCode Intelligence
          needs_json: ${{ toJson(needs) }}
