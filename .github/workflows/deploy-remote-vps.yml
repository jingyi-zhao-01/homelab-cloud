name: Deploy to Remote VPS k3s

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'charts/flashsales/**'
      - '.github/workflows/deploy-remote-vps.yml'
  workflow_dispatch:

concurrency:
  group: deploy-remote-vps-${{ github.ref }}
  cancel-in-progress: true

env:
  NAMESPACE: ${{ vars.K8S_NAMESPACE || 'flashsales' }}
  RELEASE: ${{ vars.HELM_RELEASE || 'flashsales' }}
  CHART_PATH: ${{ vars.HELM_CHART_PATH || 'charts/flashsales' }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/flashsales-${{ matrix.service }}:latest

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs:
      - build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl get nodes

      - name: Create GHCR image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_USERNAME or GHCR_PULL_TOKEN is missing"
            echo "Add both secrets so k3s can pull private GHCR images"
            exit 1
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm release
        run: |
          helm upgrade --install "$RELEASE" "$CHART_PATH" \
            -n "$NAMESPACE" \
            --create-namespace \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set userService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-user-service \
            --set userService.image.tag=${{ github.sha }} \
            --set userService.image.pullPolicy=IfNotPresent \
            --set productService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-product-service \
            --set productService.image.tag=${{ github.sha }} \
            --set productService.image.pullPolicy=IfNotPresent \
            --set orderService.image.repository=ghcr.io/${{ github.repository_owner }}/flashsales-order-service \
            --set orderService.image.tag=${{ github.sha }} \
            --set orderService.image.pullPolicy=IfNotPresent

      - name: Wait for rollouts
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-user-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-product-service --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/flashsales-order-service --timeout=300s

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 80 || true
          kubectl describe deploy flashsales-user-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-product-service -n "$NAMESPACE" || true
          kubectl describe deploy flashsales-order-service -n "$NAMESPACE" || true

      - name: Show final status
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl get svc -n "$NAMESPACE"

  perf-lite:
    name: Post-deploy Perf Lite
    runs-on: ubuntu-latest
    needs:
      - deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Run loadtest-lite
        run: |
          echo "Perf config (lite):"
          echo "  NAMESPACE=$NAMESPACE"
          echo "  KUBECONFIG_PATH=$HOME/.kube/config"
          echo "  K6_P50_THRESHOLD_MS=${{ vars.K6_P50_THRESHOLD_MS || '800' }}"
          echo "  K6_P90_THRESHOLD_MS=${{ vars.K6_P90_THRESHOLD_MS || '1200' }}"
          echo "  K6_P95_THRESHOLD_MS=${{ vars.K6_P95_THRESHOLD_MS || '1500' }}"
          KUBECONFIG_PATH="$HOME/.kube/config" NAMESPACE="$NAMESPACE" \
          K6_P50_THRESHOLD_MS=${{ vars.K6_P50_THRESHOLD_MS || '800' }} \
          K6_P90_THRESHOLD_MS=${{ vars.K6_P90_THRESHOLD_MS || '1200' }} \
          K6_P95_THRESHOLD_MS=${{ vars.K6_P95_THRESHOLD_MS || '1500' }} \
          make loadtest-lite

      - name: Snapshot database after lite test
        if: ${{ always() }}
        run: |
          set -euo pipefail
          mkdir -p snapshots
          DB_USER="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_USER}' | base64 -d)"
          DB_PASSWORD="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)"
          DB_NAME="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_DB}' | base64 -d)"
          SNAPSHOT_FILE="snapshots/lite-${{ github.run_id }}-${{ github.run_attempt }}.dump"
          kubectl -n "$NAMESPACE" run pgdump-lite-${{ github.run_id }}-${{ github.run_attempt }} \
            --rm -i --restart=Never --image=postgres:16-alpine \
            --env="PGPASSWORD=$DB_PASSWORD" \
            --command -- sh -c "pg_dump -h flashsales-postgres -U $DB_USER -d $DB_NAME -Fc" > "$SNAPSHOT_FILE"

      - name: Upload lite database snapshot
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: db-snapshot-lite-${{ github.run_id }}-${{ github.run_attempt }}
          path: snapshots/lite-${{ github.run_id }}-${{ github.run_attempt }}.dump
          if-no-files-found: warn

      - name: Show lite pg_dump preview in logs
        if: ${{ always() }}
        run: |
          set -euo pipefail
          DB_USER="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_USER}' | base64 -d)"
          DB_PASSWORD="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)"
          DB_NAME="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_DB}' | base64 -d)"
          echo "===== lite snapshot schema preview (first 200 lines) ====="
          kubectl -n "$NAMESPACE" run pgdump-lite-preview-${{ github.run_id }}-${{ github.run_attempt }} \
            --rm -i --restart=Never --image=postgres:16-alpine \
            --env="PGPASSWORD=$DB_PASSWORD" \
            --command -- sh -c "pg_dump -h flashsales-postgres -U $DB_USER -d $DB_NAME -Fp -s" | sed -n '1,200p'

  perf-high:
    name: Post-deploy Perf High
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - perf-lite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pause 5 minutes before high test
        run: sleep 300

      - name: Run loadtest-high
        run: |
          echo "Perf config (high):"
          echo "  NAMESPACE=$NAMESPACE"
          echo "  KUBECONFIG_PATH=$HOME/.kube/config"
          echo "  K6_P50_THRESHOLD_MS=${{ vars.K6_P50_THRESHOLD_MS_HIGH || '1200' }}"
          echo "  K6_P90_THRESHOLD_MS=${{ vars.K6_P90_THRESHOLD_MS_HIGH || '2200' }}"
          echo "  K6_P95_THRESHOLD_MS=${{ vars.K6_P95_THRESHOLD_MS_HIGH || '3000' }}"
          KUBECONFIG_PATH="$HOME/.kube/config" NAMESPACE="$NAMESPACE" \
          K6_P50_THRESHOLD_MS=${{ vars.K6_P50_THRESHOLD_MS_HIGH || '1200' }} \
          K6_P90_THRESHOLD_MS=${{ vars.K6_P90_THRESHOLD_MS_HIGH || '2200' }} \
          K6_P95_THRESHOLD_MS=${{ vars.K6_P95_THRESHOLD_MS_HIGH || '3000' }} \
          make loadtest-high-safe

      - name: Snapshot database after high test
        if: ${{ always() }}
        run: |
          set -euo pipefail
          mkdir -p snapshots
          DB_USER="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_USER}' | base64 -d)"
          DB_PASSWORD="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)"
          DB_NAME="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_DB}' | base64 -d)"
          SNAPSHOT_FILE="snapshots/high-${{ github.run_id }}-${{ github.run_attempt }}.dump"
          kubectl -n "$NAMESPACE" run pgdump-high-${{ github.run_id }}-${{ github.run_attempt }} \
            --rm -i --restart=Never --image=postgres:16-alpine \
            --env="PGPASSWORD=$DB_PASSWORD" \
            --command -- sh -c "pg_dump -h flashsales-postgres -U $DB_USER -d $DB_NAME -Fc" > "$SNAPSHOT_FILE"

      - name: Upload high database snapshot
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: db-snapshot-high-${{ github.run_id }}-${{ github.run_attempt }}
          path: snapshots/high-${{ github.run_id }}-${{ github.run_attempt }}.dump
          if-no-files-found: warn

      - name: Show high pg_dump preview in logs
        if: ${{ always() }}
        run: |
          set -euo pipefail
          DB_USER="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_USER}' | base64 -d)"
          DB_PASSWORD="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)"
          DB_NAME="$(kubectl -n "$NAMESPACE" get secret flashsales-postgres-auth -o jsonpath='{.data.POSTGRES_DB}' | base64 -d)"
          echo "===== high snapshot schema preview (first 200 lines) ====="
          kubectl -n "$NAMESPACE" run pgdump-high-preview-${{ github.run_id }}-${{ github.run_attempt }} \
            --rm -i --restart=Never --image=postgres:16-alpine \
            --env="PGPASSWORD=$DB_PASSWORD" \
            --command -- sh -c "pg_dump -h flashsales-postgres -U $DB_USER -d $DB_NAME -Fp -s" | sed -n '1,200p'
