name: Deploy Control Plane Status Client to Vercel

# Important boundary:
# - apps/client is a Vercel-only surface
# - it must not be deployed through Helm or any k3s workflow in this repository

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/client/**'
      - '.github/workflows/deploy-control-plane-status-client-vercel.yml'
  workflow_run:
    workflows:
      - Flashsales Deploy
      - Deploy Strategy Tester to strategy-tester Namespace
      - Deploy LeetCode Intelligence to leetcode-intelligence Namespace
    types:
      - completed

concurrency:
  group: deploy-client-client-vercel-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  VERCEL_ORG_ID_SSM_NAME: ${{ vars.VERCEL_ORG_ID_SSM_NAME || '/vercel/VERCEL_ORG_ID' }}
  VERCEL_TOKEN_SSM_NAME: ${{ vars.VERCEL_TOKEN_SSM_NAME || '/vercel/VERCEL_TOKEN' }}
  VERCEL_PROJECT_ID_SSM_NAME: ${{ vars.CONTROL_PLANE_STATUS_VERCEL_PROJECT_ID_SSM_NAME || '/control-plane/VERCEL_PROJECT_ID' }}

jobs:
  deploy:
    name: Deploy apps/client to Vercel
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate AWS configuration
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "AWS_ACCESS_KEY_ID secret is missing"
            exit 1
          fi

          if [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret is missing"
            exit 1
          fi

          if [ -z "${AWS_REGION:-}" ]; then
            echo "AWS_REGION repository variable is missing"
            exit 1
          fi

          if [ -z "${VERCEL_ORG_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_ORG_ID_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${VERCEL_TOKEN_SSM_NAME:-}" ]; then
            echo "VERCEL_TOKEN_SSM_NAME is missing"
            exit 1
          fi

          if [ -z "${VERCEL_PROJECT_ID_SSM_NAME:-}" ]; then
            echo "VERCEL_PROJECT_ID_SSM_NAME is missing"
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve Vercel configuration from AWS SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          bash .github/scripts/resolve-ssm-env.sh \
            VERCEL_ORG_ID="$VERCEL_ORG_ID_SSM_NAME" \
            VERCEL_TOKEN="$VERCEL_TOKEN_SSM_NAME" \
            VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID_SSM_NAME"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/client/package-lock.json

      - name: Install dependencies
        working-directory: apps/client
        run: npm ci

      - name: Pull Vercel environment
        working-directory: apps/client
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build control plane status app
        working-directory: apps/client
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        working-directory: apps/client
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
