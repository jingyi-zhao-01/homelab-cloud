name: Deploy Strategy Tester to strategy-tester Namespace

on:
  push:
    branches:
      - main
    paths:
      - 'strategy-tester/microservices/**'
      - 'strategy-tester/docker/**'
      - 'strategy-tester/pyproject.toml'
      - 'charts/strategy-tester/**'
      - '.github/workflows/deploy-strategy-tester.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strategy-tester-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: strategy-tester

jobs:
  build-and-push:
    name: Build and Push Strategy Tester Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - option-ingestor
          - snapshot-ingestor

    steps:
      - name: Checkout strategy-tester
        uses: actions/checkout@v4
        with:
          repository: jingyi-zhao-01/strategy-tester
          path: strategy-tester

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: strategy-tester
          file: strategy-tester/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/strategy-tester-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/strategy-tester-${{ matrix.service }}:latest

  deploy:
    name: Deploy to strategy-tester Namespace
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout homelab-cloud
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl get nodes

      - name: Create namespace and image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_USERNAME or GHCR_PULL_TOKEN is missing"
            exit 1
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Strategy Tester via Helm
        run: |
          helm upgrade --install strategy-tester \
            charts/strategy-tester/ \
            -n "$NAMESPACE" \
            --create-namespace \
            --set namespaceOverride="$NAMESPACE" \
            --set optionIngestor.image.tag=${{ github.sha }} \
            --set snapshotIngestor.image.tag=${{ github.sha }}

      - name: Wait for deployments
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/strategy-tester-option-ingestor --timeout=300s || true
          kubectl -n "$NAMESPACE" rollout status deploy/strategy-tester-snapshot-ingestor --timeout=300s || true

      - name: Show deployment status
        run: |
          kubectl -n "$NAMESPACE" get all
          kubectl -n "$NAMESPACE" get cronjob -o wide

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl describe deploy -n "$NAMESPACE" || true
