name: Deploy Strategy Tester to strategy-tester Namespace

on:
  push:
    branches:
      - main
    paths:
      - 'charts/strategy-tester/**'
      - '.github/actions/setup-private-k3s-access/**'
      - '.github/workflows/deploy-strategy-tester.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strategy-tester-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NAMESPACE: strategy-tester
  TS_CI_TAGS: ${{ vars.TS_CI_TAGS }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

jobs:
  deploy:
    name: Deploy to strategy-tester Namespace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homelab-cloud
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure private k3s access
        uses: ./.github/actions/setup-private-k3s-access
        with:
          kube_config_data: ${{ secrets.KUBE_CONFIG_DATA }}
          k3s_server_url_tailscale: ${{ vars.K3S_SERVER_URL_TAILSCALE }}
          ts_oauth_client_id: ${{ env.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ env.TS_OAUTH_SECRET }}
          ts_ci_tags: ${{ env.TS_CI_TAGS }}

      - name: Create namespace and image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_USERNAME or GHCR_PULL_TOKEN is missing"
            exit 1
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ESO AWS credentials secret
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is missing"
            exit 1
          fi

          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n external-secrets create secret generic aws-ssm-credentials \
            --from-literal=access-key-id="$AWS_ACCESS_KEY_ID" \
            --from-literal=secret-access-key="$AWS_SECRET_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Strategy Tester via Helm
        run: |
          helm upgrade --install strategy-tester \
            charts/strategy-tester/ \
            -n "$NAMESPACE" \
            --create-namespace \
            --set namespaceOverride="$NAMESPACE" \
            --set optionIngestor.image.tag=latest \
            --set snapshotIngestor.image.tag=latest

      - name: Trigger ingestion jobs after deploy
        run: |
          ts="$(date +%s)"

          kubectl -n "$NAMESPACE" create job \
            --from=cronjob/strategy-tester-option-ingestor \
            "strategy-tester-option-deploy-$ts"

          kubectl -n "$NAMESPACE" create job \
            --from=cronjob/strategy-tester-snapshot-ingestor \
            "strategy-tester-snapshot-deploy-$ts"

      - name: Show workload status
        run: |
          kubectl -n "$NAMESPACE" get all
          kubectl -n "$NAMESPACE" get cronjob -o wide

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get jobs -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl describe cronjob -n "$NAMESPACE" || true

  notify-discord:
    name: Notify Discord
    needs:
      - deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Send Discord notification
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DISCORD_WEBHOOK_SSM_NAME: ${{ vars.DISCORD_WEBHOOK_SSM_NAME || '/codex/discord-webhook' }}
          WORKFLOW_NAME: Deploy Strategy Tester
          NEEDS_JSON: ${{ toJson(needs) }}
        run: bash .github/scripts/notify-discord.sh
