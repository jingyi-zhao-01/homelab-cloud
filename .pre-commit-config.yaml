repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/.*/templates/
      - id: check-added-large-files
        exclude: ^apps/control-plane-triage-agent/uv\.lock$

  - repo: local
    hooks:
      - id: helm-lint-charts
        name: Helm Lint - charts
        entry: bash .github/scripts/helm-lint-charts.sh
        language: system
        files: ^charts/
        stages: [pre-commit]
        pass_filenames: false
