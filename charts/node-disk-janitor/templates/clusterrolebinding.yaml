apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "node-disk-janitor.fullname" . }}
  labels:
    {{- include "node-disk-janitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "node-disk-janitor.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "node-disk-janitor.fullname" . }}
    namespace: {{ include "node-disk-janitor.namespace" . }}
