apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "node-disk-janitor.fullname" . }}
  namespace: {{ include "node-disk-janitor.namespace" . }}
  labels:
    {{- include "node-disk-janitor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "node-disk-janitor.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
  template:
    metadata:
      labels:
        {{- include "node-disk-janitor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "node-disk-janitor.fullname" . }}
      hostPID: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-disk-janitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: {{ .Values.securityContext.privileged }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: HOST_CLEANUP_COMMAND
              value: |
{{ .Values.hostCleanupCommand | indent 16 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: {{ .Values.hostPaths.root | quote }}
            type: Directory
