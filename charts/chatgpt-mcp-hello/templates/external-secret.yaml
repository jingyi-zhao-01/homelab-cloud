{{- if .Values.externalSecrets.enabled }}
{{- $ssm := include "chatgpt-mcp-hello.ssmParameters" . | fromYaml }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "chatgpt-mcp-hello.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range $secretKey, $entry := $ssm }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $entry.path | quote }}
    {{- end }}
{{- end }}
