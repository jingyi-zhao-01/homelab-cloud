apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatgpt-mcp-hello.fullname" . }}
  namespace: {{ include "chatgpt-mcp-hello.namespace" . }}
  labels:
    {{- include "chatgpt-mcp-hello.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "chatgpt-mcp-hello.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
