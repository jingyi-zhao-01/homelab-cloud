apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "control-plane-triage-agent.fullname" . }}
  labels:
    {{- include "control-plane-triage-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "control-plane-triage-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "control-plane-triage-agent.fullname" . }}
    namespace: {{ include "control-plane-triage-agent.namespace" . }}
