{{- if .Values.externalSecrets.enabled }}
{{- $chartValues := .Values }}
{{- $ssm := include "control-plane-triage-agent.ssmParameters" . | fromYaml }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "control-plane-triage-agent.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
{{- range $secretKey, $entry := $ssm }}
{{- if or (ne $secretKey "OPENHANDS_LLM_API_KEY") $chartValues.externalSecrets.optionalKeys.openhandsApiKey }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $entry.path | quote }}
    {{- end }}
    {{- end }}
{{- end }}
