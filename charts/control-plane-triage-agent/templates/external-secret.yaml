{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "control-plane-triage-agent.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: {{ printf "%s/GITHUB_TOKEN" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: {{ printf "%s/DISCORD_BOT_TOKEN" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: DISCORD_CHANNEL_ID
      remoteRef:
        key: {{ printf "%s/DISCORD_CHANNEL_ID" .Values.externalSecrets.parameterPrefix | quote }}
{{- if .Values.externalSecrets.optionalKeys.discordWebhookUrl }}
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: {{ printf "%s/DISCORD_WEBHOOK_URL" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
{{- if .Values.externalSecrets.optionalKeys.openhandsApiKey }}
    - secretKey: OPENHANDS_LLM_API_KEY
      remoteRef:
        key: {{ printf "%s/OPENHANDS_LLM_API_KEY" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
{{- end }}
