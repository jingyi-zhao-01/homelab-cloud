apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-plane-triage-agent.fullname" . }}
  namespace: {{ include "control-plane-triage-agent.namespace" . }}
  labels:
    {{- include "control-plane-triage-agent.labels" . | nindent 4 }}
  annotations:
    control-plane-triage-agent/image-tag: {{ .Values.image.tag | quote }}
    {{- if .Values.deploymentMetadata.gitSha }}
    control-plane-triage-agent/git-sha: {{ .Values.deploymentMetadata.gitSha | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "control-plane-triage-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "control-plane-triage-agent.selectorLabels" . | nindent 8 }}
      annotations:
        control-plane-triage-agent/image-tag: {{ .Values.image.tag | quote }}
        {{- if .Values.deploymentMetadata.gitSha }}
        control-plane-triage-agent/git-sha: {{ .Values.deploymentMetadata.gitSha | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "control-plane-triage-agent.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane-triage-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "control-plane-triage-agent.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /var/lib/control-plane-triage-agent
      volumes:
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "control-plane-triage-agent.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
