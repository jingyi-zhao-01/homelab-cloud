# Shared Parameter Store keys for the control-plane-triage-agent deployment.
# The ExternalSecret template renders these keys directly, so helm values
# no longer need to hardcode per-key SSM paths.

GITHUB_TOKEN:
  path: /control-plane-triage-agent/prod/GITHUB_TOKEN
  optional: false

DISCORD_BOT_TOKEN:
  path: /control-plane-triage-agent/prod/DISCORD_BOT_TOKEN
  optional: false

DISCORD_CHANNEL_ID:
  path: /control-plane-triage-agent/prod/DISCORD_CHANNEL_ID
  optional: false

OPENHANDS_LLM_API_KEY:
  path: /openrouter/OPEN_ROUTER_API_KEY
  optional: true

OTEL_EXPORTER_OTLP_ENDPOINT:
  path: /grafana/OTEL_EXPORTER_OTLP_ENDPOINT
  optional: false

OTEL_EXPORTER_OTLP_HEADERS:
  path: /grafana/OTEL_EXPORTER_OTLP_HEADERS
  optional: false
