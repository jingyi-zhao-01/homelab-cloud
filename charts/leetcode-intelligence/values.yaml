## Global deployment settings
namespaceOverride: ""

imagePullSecrets:
  - name: ghcr-pull-secret

image:
  repository: ghcr.io/jingyi-zhao-01/leetcode-intelligence-service
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

## Per-workload process layout
workloads:
  server:
    enabled: true
    replicaCount: 1
    command:
      - npm
      - run
      - --workspace
      - services/leetcode-intelligence-service
      - intelligence-server

  promptDispatch:
    enabled: true
    replicaCount: 1
    command:
      - npm
      - run
      - --workspace
      - services/leetcode-intelligence-service
      - intelligence-prompt-dispatch

  promptListener:
    enabled: true
    replicaCount: 1
    # Long-running listener service (not a cron workload).
    command:
      - npm
      - run
      - --workspace
      - services/leetcode-intelligence-service
      - intelligence-prompt-listener

  recommender:
    enabled: true
    replicaCount: 1
    command:
      - npm
      - run
      - --workspace
      - services/leetcode-intelligence-service
      - intelligence-recommender

## HTTP exposure for server workload
service:
  type: ClusterIP
  port: 8030

## Server autoscaling (used when enabled)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

## Runtime env vars shared by all workloads
env:
  MODEL: deepseek/deepseek-v4-flash
  INTELLIGENCE_HOST: "0.0.0.0"
  INTELLIGENCE_PORT: "8030"
  # Every 5 minutes for prompt dispatch.
  INTELLIGENCE_PROMPT_CRON: "*/5 * * * *"
  # Every 5 minutes for recommendation push.
  INTELLIGENCE_RECOMMEND_CRON: "*/5 * * * *"
  INTELLIGENCE_RECOMMEND_TOP_K: "5"
  INTELLIGENCE_RECOMMEND_LOOKBACK_DAYS: "30"
  INTELLIGENCE_MAX_CANDIDATES: "500"
  INTELLIGENCE_SELECTION_WINDOW: "200"
  INTELLIGENCE_MIN_WEIGHT: "0.25"
  INTELLIGENCE_MAX_WEIGHT: "5"

## Secret sources
secrets:
  existingSecretName: leetcode-intelligence-service-secrets

externalSecrets:
  enabled: true
  refreshInterval: 1h
  targetSecretName: leetcode-intelligence-service-secrets
  parameterPrefix: /leetcode-intelligence/prod
  optionalKeys:
    apiKey: false
  store:
    kind: ClusterSecretStore
    name: leetcode-intelligence-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      name: aws-ssm-credentials
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key
