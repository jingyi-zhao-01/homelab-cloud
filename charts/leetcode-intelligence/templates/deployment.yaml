{{- range $name, $workload := .Values.workloads }}
{{- if and $workload.enabled (not (or (eq $name "promptDispatch") (eq $name "recommender"))) }}
{{- $component := kebabcase $name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" (include "leetcode-intelligence.fullname" $) $component }}
  namespace: {{ include "leetcode-intelligence.namespace" $ }}
  labels:
    {{- include "leetcode-intelligence.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  {{- if and (eq $name "server") (not $.Values.autoscaling.enabled) }}
  replicas: {{ $workload.replicaCount }}
  {{- else if ne $name "server" }}
  replicas: {{ $workload.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "leetcode-intelligence.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        {{- include "leetcode-intelligence.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: intelligence-service
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            {{- toYaml $workload.command | nindent 12 }}
          {{- if eq $name "server" }}
          ports:
            - name: http
              containerPort: {{ $.Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          {{- with $.Values.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- $secretName := include "leetcode-intelligence.secretName" $ | trim }}
          {{- if $secretName }}
          envFrom:
            - secretRef:
                name: {{ $secretName }}
          {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
{{- end }}
{{- end }}
