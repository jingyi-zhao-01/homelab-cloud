{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "leetcode-intelligence.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ printf "%s/DATABASE_URL" .Values.externalSecrets.parameterPrefix | quote }}
{{- if .Values.externalSecrets.optionalKeys.openRouterApiKey }}
    - secretKey: OPEN_ROUTER_API_KEY
      remoteRef:
        key: {{ printf "%s/OPEN_ROUTER_API_KEY" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
{{- if .Values.externalSecrets.optionalKeys.apiKey }}
    - secretKey: API_KEY
      remoteRef:
        key: {{ printf "%s/API_KEY" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: {{ printf "%s/DISCORD_BOT_TOKEN" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: PROMPT_DISCORD_CHANNEL_ID
      remoteRef:
        key: {{ printf "%s/PROMPT_DISCORD_CHANNEL_ID" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: RECOMMEND_DISCORD_CHANNEL_ID
      remoteRef:
        key: {{ printf "%s/RECOMMEND_DISCORD_CHANNEL_ID" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
