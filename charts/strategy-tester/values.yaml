namespaceOverride: ""

imagePullSecrets:
  - name: ghcr-pull-secret

observability:
  tracing:
    otlpProtocol: "http/protobuf"
    otlpHttpEndpoint: ""
    otlpHeaders: ""
    externalSecretEnabled: true
    existingSecretEndpointKey: "OTEL_EXPORTER_OTLP_ENDPOINT"
    existingSecretName: "strategy-tester-apis"
    existingSecretKey: "OTEL_EXPORTER_OTLP_HEADERS"

externalSecrets:
  enabled: true
  refreshInterval: 1h
  targetSecretName: strategy-tester-apis
  parameterMapFile: ssm-parameter-keys.yaml
  store:
    kind: ClusterSecretStore
    name: strategy-tester-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      name: aws-ssm-credentials
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key

optionIngestor:
  replicaCount: 1
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: ghcr.io/jingyi-zhao-01/strategy-tester-option-ingestor
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "300m"
      memory: "384Mi"
    limits:
      cpu: "750m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 8001
  env:
    LOG_LEVEL: INFO
    INGEST_CONCURRENCY_LIMIT: "20"
    INGEST_DB_CONCURRENCY_LIMIT: "20"
    INGEST_DB_WRITE_BATCH_SIZE: "25"
    INGEST_OPTION_BATCH_SIZE: "500"
    OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT: "32"
    OTEL_SPAN_EVENT_COUNT_LIMIT: "8"
    OTEL_SPAN_ATTRIBUTE_VALUE_LENGTH_LIMIT: "256"
  cronJob:
    enabled: true
    schedule: "0 22 * * 0-5"
    timeZone: "America/New_York"
    parallelism: 1
    completions: 1
    restartPolicy: OnFailure
    backoffLimit: 1
    ttlSecondsAfterFinished: 3600

snapshotIngestor:
  replicaCount: 1
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: ghcr.io/jingyi-zhao-01/strategy-tester-snapshot-ingestor
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "300m"
      memory: "384Mi"
    limits:
      cpu: "750m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 8002
  env:
    LOG_LEVEL: INFO
    INGEST_CONCURRENCY_LIMIT: "20"
    INGEST_DB_CONCURRENCY_LIMIT: "20"
    INGEST_OPTION_BATCH_SIZE: "500"
    OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT: "32"
    OTEL_SPAN_EVENT_COUNT_LIMIT: "8"
    OTEL_SPAN_ATTRIBUTE_VALUE_LENGTH_LIMIT: "256"
    SNAPSHOT_FETCH_CONCURRENCY: "10"
    SNAPSHOT_FETCH_BATCH_SIZE: "10"
    SNAPSHOT_FETCH_CONNECT_TIMEOUT: "30.0"
    SNAPSHOT_FETCH_READ_TIMEOUT: "30.0"
    SNAPSHOT_HTTP_MAX_CONNECTIONS: "20"
    SNAPSHOT_HTTP_MAX_KEEPALIVE_CONNECTIONS: "10"
  cronJob:
    enabled: true
    schedule: "0 23 * * 0-5"
    timeZone: "America/New_York"
    parallelism: 1
    completions: 1
    restartPolicy: OnFailure
    backoffLimit: 1
    ttlSecondsAfterFinished: 3600
