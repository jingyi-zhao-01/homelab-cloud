{{- if .Values.externalSecrets.enabled }}
{{- $ssm := include "strategy-tester.ssmParameters" . | fromYaml }}
{{- $values := .Values | toYaml | fromYaml }}
{{- $externalTracingEnabled := dig "observability" "tracing" "externalSecretEnabled" false $values }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "strategy-tester.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range $secretKey, $entry := $ssm }}
    {{- if and (not $externalTracingEnabled) (hasPrefix "OTEL_EXPORTER_" $secretKey) }}
    {{- else }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $entry.path | quote }}
        {{- if default false $entry.optional }}
        optional: true
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
