{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ include "strategy-tester.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ printf "%s/DATABASE_URL" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: POLYGON_API_KEY
      remoteRef:
        key: {{ printf "%s/POLYGON_API_KEY" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
