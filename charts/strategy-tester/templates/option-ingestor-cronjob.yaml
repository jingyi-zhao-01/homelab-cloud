{{- if .Values.optionIngestor.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "strategy-tester.fullname" . }}-option-ingestor
  namespace: {{ include "strategy-tester.namespace" . }}
  labels:
    app: option-ingestor
    {{- include "strategy-tester.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.optionIngestor.cronJob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      parallelism: {{ .Values.optionIngestor.cronJob.parallelism }}
      completions: {{ .Values.optionIngestor.cronJob.completions }}
      backoffLimit: {{ .Values.optionIngestor.cronJob.backoffLimit }}
      template:
        metadata:
          labels:
            app: option-ingestor
            {{- include "strategy-tester.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: {{ .Values.optionIngestor.cronJob.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: option-ingestor
              image: "{{ .Values.optionIngestor.image.repository }}:{{ .Values.optionIngestor.image.tag }}"
              imagePullPolicy: {{ .Values.optionIngestor.image.pullPolicy }}
              {{- with .Values.optionIngestor.env }}
              env:
                {{- range $key, $value := . }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: {{ $.Values.observability.tracing.otlpProtocol | default "http/protobuf" | quote }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: {{ $.Values.observability.tracing.otlpHttpEndpoint | default "" | quote }}
                {{- if $.Values.observability.tracing.existingSecretName }}
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.observability.tracing.existingSecretName }}
                      key: {{ $.Values.observability.tracing.existingSecretKey }}
                {{- else if $.Values.observability.tracing.otlpHeaders }}
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  value: {{ $.Values.observability.tracing.otlpHeaders | quote }}
                {{- end }}
              {{- end }}
              {{- if .Values.externalSecrets.enabled }}
              envFrom:
                - secretRef:
                    name: {{ .Values.externalSecrets.targetSecretName }}
              {{- end }}
              resources:
                {{- toYaml .Values.optionIngestor.resources | nindent 16 }}
{{- end }}
