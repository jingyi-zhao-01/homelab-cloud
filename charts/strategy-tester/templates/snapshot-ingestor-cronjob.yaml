{{- if .Values.snapshotIngestor.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "strategy-tester.fullname" . }}-snapshot-ingestor
  namespace: {{ include "strategy-tester.namespace" . }}
  labels:
    app: snapshot-ingestor
    {{- include "strategy-tester.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.snapshotIngestor.cronJob.schedule | quote }}
  {{- if .Values.snapshotIngestor.cronJob.timeZone }}
  timeZone: {{ .Values.snapshotIngestor.cronJob.timeZone | quote }}
  {{- end }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      parallelism: {{ .Values.snapshotIngestor.cronJob.parallelism }}
      completions: {{ .Values.snapshotIngestor.cronJob.completions }}
      backoffLimit: {{ .Values.snapshotIngestor.cronJob.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.snapshotIngestor.cronJob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app: snapshot-ingestor
            {{- include "strategy-tester.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: {{ .Values.snapshotIngestor.cronJob.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: snapshot-ingestor
              image: "{{ .Values.snapshotIngestor.image.repository }}:{{ .Values.snapshotIngestor.image.tag }}"
              imagePullPolicy: {{ .Values.snapshotIngestor.image.pullPolicy }}
              {{- with .Values.snapshotIngestor.env }}
              env:
                {{- range $key, $value := . }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: {{ $.Values.observability.tracing.otlpProtocol | default "http/protobuf" | quote }}
                {{- if $.Values.observability.tracing.existingSecretName }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.observability.tracing.existingSecretName }}
                      key: {{ $.Values.observability.tracing.existingSecretEndpointKey }}
                {{- else }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: {{ $.Values.observability.tracing.otlpHttpEndpoint | default "" | quote }}
                {{- end }}
                {{- if $.Values.observability.tracing.existingSecretName }}
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.observability.tracing.existingSecretName }}
                      key: {{ $.Values.observability.tracing.existingSecretKey }}
                {{- else if $.Values.observability.tracing.otlpHeaders }}
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  value: {{ $.Values.observability.tracing.otlpHeaders | quote }}
                {{- end }}
              {{- end }}
              {{- if .Values.externalSecrets.enabled }}
              envFrom:
                - secretRef:
                    name: {{ .Values.externalSecrets.targetSecretName }}
              {{- end }}
              resources:
                {{- toYaml .Values.snapshotIngestor.resources | nindent 16 }}
{{- end }}
