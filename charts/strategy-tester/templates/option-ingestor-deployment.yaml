apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strategy-tester.fullname" . }}-option-ingestor
  namespace: {{ include "strategy-tester.namespace" . }}
  labels:
    app: option-ingestor
    {{- include "strategy-tester.labels" . | nindent 4 }}
spec:
  {{- if not .Values.optionIngestor.autoscaling.enabled }}
  replicas: {{ .Values.optionIngestor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: option-ingestor
      {{- include "strategy-tester.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: option-ingestor
        {{- include "strategy-tester.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: option-ingestor
          image: "{{ .Values.optionIngestor.image.repository }}:{{ .Values.optionIngestor.image.tag }}"
          imagePullPolicy: {{ .Values.optionIngestor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.optionIngestor.service.port }}
              protocol: TCP
          {{- with .Values.optionIngestor.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.externalSecrets.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecrets.targetSecretName }}
          {{- end }}
          resources:
            {{- toYaml .Values.optionIngestor.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
