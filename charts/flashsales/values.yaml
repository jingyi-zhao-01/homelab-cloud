namespaceOverride: ""

imagePullSecrets: []

observability:
  tracing:
    otlpProtocol: "http/protobuf"
    otlpHttpEndpoint: "https://otlp-gateway-prod-us-west-0.grafana.net/otlp/v1/traces"
    otlpHeaders: "Authorization=Basic MTMyNzEyMDpnbGNfZXlKdklqb2lNVFE1TVRRNE5pSXNJbTRpT2lKemRHRmpheTB4TXpJM01USXdMVzkwYkhBdGQzSnBkR1V0YUc5dFpXeGhZaUlzSW1zaU9pSnZkRWd6T1ZoMk9URmtOMGhKU0hjM016RmlObkUzUm1raUxDSnRJanA3SW5JaU9pSndjbTlrTFhWekxYZGxjM1F0TUNKOWZRPT0="
    existingSecretName: ""
    existingSecretKey: "OTEL_EXPORTER_OTLP_HEADERS"

redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: ClusterIP
    port: 6379
  auth:
    password: redis-pass
  storage:
    size: 2Gi
    className: ""

rabbitmq:
  enabled: false
  image:
    repository: rabbitmq
    tag: "3.13-management-alpine"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "250m"
      memory: "384Mi"
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
  auth:
    username: flashsales
    password: mq-pass
    vhost: "/"
  storage:
    size: 5Gi
    className: ""

dbProxy:
  enabled: false
  proxyName: flashsales-neon-db
  image:
    repository: shopify/toxiproxy
    tag: "2.12.0"
    pullPolicy: IfNotPresent
  bootstrapImage:
    repository: curlimages/curl
    tag: "8.8.0"
    pullPolicy: IfNotPresent
  service:
    dataPort: 5432
    adminPort: 8474
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

userService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/user-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8001
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: ""
    dbPort: ""
    dbName: ""

productService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/product-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8002
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: ""
    dbPort: ""
    dbName: ""
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"

orderService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/order-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8003
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    userServiceUrl: http://flashsales-user-service:8001
    productServiceUrl: http://flashsales-product-service:8002
    dependencyTimeoutSeconds: "3"
    maxInflightOrders: "32"
    dbHost: ""
    dbPort: ""
    dbName: ""
    redisUrl: redis://:redis-pass@flashsales-redis:6379/0
    rabbitmqUrl: amqp://flashsales:mq-pass@flashsales-rabbitmq:5672/
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"

# Example to force all three services onto non-control worker nodes:
# userService:
#   nodeSelector:
#     node-purpose: worker
# productService:
#   nodeSelector:
#     node-purpose: worker
# orderService:
#   nodeSelector:
#     node-purpose: worker
#
# If you want to exclude control-plane nodes by role label instead of targeting
# worker labels directly, use affinity like this under each service:
#   affinity:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: node-role.kubernetes.io/control-plane
#                 operator: DoesNotExist

ingress:
  enabled: true
  userServiceHost: "homelab-user-service.jzhao62.com"
  productServiceHost: "homelab-product-service.jzhao62.com"
  orderServiceHost: "homelab-order-service.jzhao62.com"

externalSecrets:
  enabled: false
  refreshInterval: 1h
  targetSecretName: flashsales-postgres-auth
  parameterPrefix: /flashsales/prod
  store:
    # Supported values: SecretStore or ClusterSecretStore
    kind: ClusterSecretStore
    name: flashsales-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      # Secret with access-key-id / secret-access-key for ESO to access AWS API.
      name: aws-ssm-credentials
      # Required only when kind=ClusterSecretStore.
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key

# Observability Agent configuration
observabilityAgent:
  enabled: false
  image:
    repository: python
    tag: "3.11-slim"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  aws:
    # AWS_REGION must be set in the deployment env.
    region: ""
  ssm:
    # Full SSM path to the Grafana service-account token.
    grafanaTokenPath: "/codex/grafana-service-account-token"
    # Full SSM path to the OpenRouter (or compatible) LLM API key.
    llmApiKeyPath: "/flashsales/prod/llm-api-key"
  grafana:
    # GRAFANA_URL must be set in the deployment env.
    url: ""
  github:
    # These are injected from GitHub Actions context; leave empty for k8s mode.
    owner: ""
    repo: ""
    # GitHub personal access token (required for k8s mode).
    # When running as a GitHub Actions workflow this is injected automatically.
    githubToken: ""
  llm:
    # LLM_MODEL (e.g. openai/gpt-4o) and LLM_BASE_URL (e.g. https://openrouter.ai/api/v1).
    model: ""
    baseUrl: ""
  # Name of the workflow to monitor.
  workflowName: "flashsales-perf-concurrency-suite.yml"
  # Seconds between each poll of the GitHub Actions API.
  checkInterval: 300
  # Logging (json or text).
  logLevel: "INFO"
  logFormat: "json"
  nodeSelector: {}
  tolerations: []
  affinity: {}
