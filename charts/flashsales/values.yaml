namespaceOverride: ""

imagePullSecrets: []

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 5432
  auth:
    username: flashsales
    password: flashsales-pass
    database: flashsales
  storage:
    size: 20Gi
    className: ""
  runtime:
    maxConnections: "200"
    sharedBuffers: "512MB"
    effectiveCacheSize: "1536MB"
    workMem: "8MB"
    maintenanceWorkMem: "128MB"
    checkpointCompletionTarget: "0.9"
    walBuffers: "16MB"
    randomPageCost: "1.1"
    logLockWaits: "on"
    deadlockTimeout: "200ms"
    logMinDurationStatement: "200ms"
    logLinePrefix: "%m [%p] %q%u@%d "
    sharedPreloadLibraries: ""

redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: ClusterIP
    port: 6379
  auth:
    password: redis-pass
  storage:
    size: 2Gi
    className: ""

rabbitmq:
  enabled: false
  image:
    repository: rabbitmq
    tag: "3.13-management-alpine"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "250m"
      memory: "384Mi"
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
  auth:
    username: flashsales
    password: mq-pass
    vhost: "/"
  storage:
    size: 5Gi
    className: ""

dbProxy:
  enabled: false
  proxyName: flashsales-neon-db
  image:
    repository: shopify/toxiproxy
    tag: "2.12.0"
    pullPolicy: IfNotPresent
  bootstrapImage:
    repository: curlimages/curl
    tag: "8.8.0"
    pullPolicy: IfNotPresent
  service:
    dataPort: 5432
    adminPort: 8474
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

userService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/user-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8001
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales

productService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/product-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8002
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"

orderService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/order-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8003
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    userServiceUrl: http://flashsales-user-service:8001
    productServiceUrl: http://flashsales-product-service:8002
    dependencyTimeoutSeconds: "3"
    maxInflightOrders: "32"
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales
    redisUrl: redis://:redis-pass@flashsales-redis:6379/0
    rabbitmqUrl: amqp://flashsales:mq-pass@flashsales-rabbitmq:5672/
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"

# Example to force all three services onto non-control worker nodes:
# userService:
#   nodeSelector:
#     node-purpose: worker
# productService:
#   nodeSelector:
#     node-purpose: worker
# orderService:
#   nodeSelector:
#     node-purpose: worker
#
# If you want to exclude control-plane nodes by role label instead of targeting
# worker labels directly, use affinity like this under each service:
#   affinity:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: node-role.kubernetes.io/control-plane
#                 operator: DoesNotExist

ingress:
  enabled: true
  userServiceHost: "homelab-user-service.jzhao62.com"
  productServiceHost: "homelab-product-service.jzhao62.com"
  orderServiceHost: "homelab-order-service.jzhao62.com"

externalSecrets:
  enabled: false
  refreshInterval: 1h
  targetSecretName: flashsales-postgres-auth
  parameterPrefix: /flashsales/prod
  store:
    # Supported values: SecretStore or ClusterSecretStore
    kind: ClusterSecretStore
    name: flashsales-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      # Secret with access-key-id / secret-access-key for ESO to access AWS API.
      name: aws-ssm-credentials
      # Required only when kind=ClusterSecretStore.
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key
