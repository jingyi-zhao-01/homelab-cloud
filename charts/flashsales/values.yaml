namespaceOverride: ""

imagePullSecrets: []

observability:
  tracing:
    otlpProtocol: "http/protobuf"
    otlpHttpEndpoint: "https://otlp-gateway-prod-us-west-0.grafana.net/otlp/v1/traces"
    otlpHeaders: "Authorization=Basic MTMyNzEyMDpnbGNfZXlKdklqb2lNVFE1TVRRNE5pSXNJbTRpT2lKemRHRmpheTB4TXpJM01USXdMVzkwYkhBdGQzSnBkR1V0YUc5dFpXeGhZaUlzSW1zaU9pSnZkRWd6T1ZoMk9URmtOMGhKU0hjM016RmlObkUzUm1raUxDSnRJanA3SW5JaU9pSndjbTlrTFhWekxYZGxjM1F0TUNKOWZRPT0="
    existingSecretName: ""
    existingSecretKey: "OTEL_EXPORTER_OTLP_HEADERS"

dbProxy:
  enabled: false
  proxyName: flashsales-neon-db
  image:
    repository: shopify/toxiproxy
    tag: "2.12.0"
    pullPolicy: IfNotPresent
  bootstrapImage:
    repository: curlimages/curl
    tag: "8.8.0"
    pullPolicy: IfNotPresent
  service:
    dataPort: 5432
    adminPort: 8474
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

userService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/user-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8001
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: ""
    dbPort: ""
    dbName: ""
    dbPoolMinSize: "1"
    dbPoolMaxSize: "8"
    dbPoolTimeoutSeconds: "5"

productService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/product-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8002
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  env:
    dbHost: ""
    dbPort: ""
    dbName: ""
    dbPoolMinSize: "1"
    dbPoolMaxSize: "16"
    dbPoolTimeoutSeconds: "5"
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"
    reservationTtlSeconds: "300"

orderService:
  replicaCount: 1
  workerReplicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/order-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8003
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6
  nodeSelector:
    node-purpose: worker
  tolerations: []
  affinity: {}
  runBackgroundWorker: false
  env:
    userServiceUrl: http://flashsales-user-service:8001
    productServiceUrl: http://flashsales-product-service:8002
    dependencyTimeoutSeconds: "8"
    userServiceTimeoutSeconds: "5"
    productReserveTimeoutSeconds: "8"
    productReleaseTimeoutSeconds: "5"
    productTerminalizeTimeoutSeconds: "8"
    maxInflightOrders: "64"
    dbHost: ""
    dbPort: ""
    dbName: ""
    dbPoolMinSize: "2"
    dbPoolMaxSize: "16"
    dbPoolTimeoutSeconds: "5"
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"
  worker:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    nodeSelector:
      node-purpose: worker
    tolerations: []
    affinity: {}
    env:
      dbPoolMinSize: "1"
      dbPoolMaxSize: "8"
      dbPoolTimeoutSeconds: "5"

# Example to force all three services onto non-control worker nodes:
# userService:
#   nodeSelector:
#     node-purpose: worker
# productService:
#   nodeSelector:
#     node-purpose: worker
# orderService:
#   nodeSelector:
#     node-purpose: worker
#
# If you want to exclude control-plane nodes by role label instead of targeting
# worker labels directly, use affinity like this under each service:
#   affinity:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: node-role.kubernetes.io/control-plane
#                 operator: DoesNotExist

ingress:
  enabled: true
  userServiceHost: "homelab-user-service.jzhao62.com"
  productServiceHost: "homelab-product-service.jzhao62.com"
  orderServiceHost: "homelab-order-service.jzhao62.com"

externalSecrets:
  enabled: true
  includeUpstashRedis: true
  refreshInterval: 1h
  targetSecretName: flashsales-postgres-auth
  parameterPrefix: /flashsales/prod
  store:
    # Supported values: SecretStore or ClusterSecretStore
    kind: ClusterSecretStore
    name: flashsales-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      # Secret with access-key-id / secret-access-key for ESO to access AWS API.
      name: aws-ssm-credentials
      # Required only when kind=ClusterSecretStore.
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key
