namespaceOverride: ""

imagePullSecrets: []

postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: ClusterIP
    port: 5432
  auth:
    username: flashsales
    password: flashsales-pass
    database: flashsales
  storage:
    size: 5Gi
    className: ""

redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: ClusterIP
    port: 6379
  auth:
    password: redis-pass
  storage:
    size: 2Gi
    className: ""

rabbitmq:
  enabled: false
  image:
    repository: rabbitmq
    tag: "3.13-management-alpine"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "250m"
      memory: "384Mi"
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
  auth:
    username: flashsales
    password: mq-pass
    vhost: "/"
  storage:
    size: 5Gi
    className: ""

userService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/user-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8001
  env:
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales

productService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/product-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8002
  env:
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales
    inventoryLockMode: optimistic
    optimisticRetryLimit: "5"

orderService:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  image:
    repository: flashsales/order-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "100m"
  service:
    type: ClusterIP
    port: 8003
  env:
    userServiceUrl: http://flashsales-user-service:8001
    productServiceUrl: http://flashsales-product-service:8002
    dependencyTimeoutSeconds: "8"
    dbHost: flashsales-postgres
    dbPort: "5432"
    dbName: flashsales
    redisUrl: redis://:redis-pass@flashsales-redis:6379/0
    rabbitmqUrl: amqp://flashsales:mq-pass@flashsales-rabbitmq:5672/

ingress:
  enabled: true
  userServiceHost: "homelab-user-service.jzhao62.com"
  productServiceHost: "homelab-product-service.jzhao62.com"
  orderServiceHost: "homelab-order-service.jzhao62.com"

externalSecrets:
  enabled: false
  refreshInterval: 1h
  targetSecretName: flashsales-postgres-auth
  parameterPrefix: /flashsales/prod
  store:
    # Supported values: SecretStore or ClusterSecretStore
    kind: ClusterSecretStore
    name: flashsales-aws-ssm
    create: true
    region: us-west-1
    authSecret:
      # Secret with access-key-id / secret-access-key for ESO to access AWS API.
      name: aws-ssm-credentials
      # Required only when kind=ClusterSecretStore.
      namespace: external-secrets
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key
