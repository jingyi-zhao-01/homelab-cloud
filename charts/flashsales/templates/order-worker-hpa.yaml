{{- if .Values.orderService.worker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flashsales-order-worker
  namespace: {{ include "flashsales.namespace" . }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flashsales-order-worker
  minReplicas: {{ .Values.orderService.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.orderService.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.orderService.worker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
