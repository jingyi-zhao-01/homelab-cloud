apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashsales-order-service
  namespace: {{ include "flashsales.namespace" . }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-service
spec:
  {{- if not .Values.orderService.autoscaling.enabled }}
  replicas: {{ .Values.orderService.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: order-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "flashsales.labels" . | nindent 8 }}
        {{- include "flashsales.datadogPodLabels" . | nindent 8 }}
        tags.datadoghq.com/service: "flashsales-order-service"
        app.kubernetes.io/component: order-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: order-service
          image: "{{ .Values.orderService.image.repository }}:{{ .Values.orderService.image.tag }}"
          imagePullPolicy: {{ .Values.orderService.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: flashsales-order-service-config
          env:
            - name: ORDER_SERVICE_RUN_BACKGROUND_WORKER
              value: {{ .Values.orderService.runBackgroundWorker | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: POSTGRES_PASSWORD
            {{- if not .Values.dbProxy.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: DATABASE_URL
                  optional: true
            {{- end }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: REDIS_URL
                  optional: true
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_SERVICE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_SERVICE_URI
            - name: KAFKA_SECURITY_PROTOCOL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_SECURITY_PROTOCOL
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_USERNAME
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_PASSWORD
            - name: KAFKA_CA_CERT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_CA_CERT
            - name: KAFKA_TERMINALIZATION_TOPIC
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_TERMINALIZATION_TOPIC
            - name: KAFKA_TERMINALIZATION_RETRY_TOPIC
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_TERMINALIZATION_RETRY_TOPIC
            - name: KAFKA_TERMINALIZATION_DLQ_TOPIC
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_TERMINALIZATION_DLQ_TOPIC
            - name: KAFKA_TERMINALIZATION_CONSUMER_GROUP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.targetSecretName }}
                  key: KAFKA_TERMINALIZATION_CONSUMER_GROUP
            - name: DD_DATA_STREAMS_ENABLED
              value: "true"
            {{- if .Values.observability.tracing.existingSecretName }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.tracing.existingSecretName }}
                  key: {{ .Values.observability.tracing.existingSecretEndpointKey }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.tracing.existingSecretName }}
                  key: {{ .Values.observability.tracing.existingSecretKey }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.orderService.service.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.orderService.service.port }}
            initialDelaySeconds: {{ .Values.orderService.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.orderService.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.orderService.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.orderService.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /live
              port: {{ .Values.orderService.service.port }}
            initialDelaySeconds: {{ .Values.orderService.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.orderService.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.orderService.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.orderService.livenessProbe.failureThreshold }}
          {{- with .Values.orderService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
