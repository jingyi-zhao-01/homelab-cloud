apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashsales-order-worker
  namespace: {{ include "flashsales.namespace" . }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-worker
spec:
  replicas: {{ .Values.orderService.workerReplicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: order-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: order-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orderService.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: order-worker
          image: "{{ .Values.orderService.image.repository }}:{{ .Values.orderService.image.tag }}"
          imagePullPolicy: {{ .Values.orderService.image.pullPolicy }}
          command:
            - python
            - -m
            - app.entrypoints.worker_main
          envFrom:
            - configMapRef:
                name: flashsales-order-service-config
          env:
            - name: DB_POOL_MIN_SIZE
              value: {{ .Values.orderService.worker.env.dbPoolMinSize | quote }}
            - name: DB_POOL_MAX_SIZE
              value: {{ .Values.orderService.worker.env.dbPoolMaxSize | quote }}
            - name: DB_POOL_TIMEOUT_SECONDS
              value: {{ .Values.orderService.worker.env.dbPoolTimeoutSeconds | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: POSTGRES_PASSWORD
            {{- if not .Values.dbProxy.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flashsales-postgres-auth
                  key: DATABASE_URL
                  optional: true
            {{- end }}
            {{- if .Values.observability.tracing.existingSecretName }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.tracing.existingSecretName }}
                  key: {{ .Values.observability.tracing.existingSecretKey }}
            {{- end }}
          {{- with .Values.orderService.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
