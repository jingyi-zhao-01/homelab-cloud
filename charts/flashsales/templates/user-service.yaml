apiVersion: v1
kind: Service
metadata:
  name: flashsales-user-service
  namespace: {{ include "flashsales.namespace" . }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: user-service
spec:
  type: {{ .Values.userService.service.type }}
  selector:
    app.kubernetes.io/component: user-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.userService.service.port }}
      targetPort: {{ .Values.userService.service.port }}
      protocol: TCP
      name: http
