{{- if .Values.observabilityAgent.enabled }}
# ---------------------------------------------------------------------------
# Observability Agent secrets.
#
# The agent fetches Grafana and LLM tokens directly from AWS SSM at runtime
# via boto3.  Only GITHUB_TOKEN needs to be provided as a Kubernetes Secret
# (the agent does NOT read GITHUB_TOKEN from SSM because GitHub Actions
# injects it and k8s deployments typically store it in-cluster).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-observability-agent-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-agent
type: Opaque
data:
  GITHUB_TOKEN: {{ .Values.observabilityAgent.githubToken | b64enc | quote }}
{{- end }}
