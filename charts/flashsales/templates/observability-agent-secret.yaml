{{- if .Values.observabilityAgent.enabled }}
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-observability-agent-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flashsales.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-agent
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.store.name }}
    kind: {{ .Values.externalSecrets.store.kind }}
  target:
    name: {{ .Release.Name }}-observability-agent-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        GRAFANA_TOKEN: "{{ .Values.observabilityAgent.grafana.serviceAccountToken }}"
        GITHUB_TOKEN: "{{ .Values.observabilityAgent.github.token }}"
  data:
    - secretKey: GRAFANA_TOKEN
      sourceRef:
        secretStoreRef:
          name: {{ .Values.externalSecrets.store.name }}
          kind: {{ .Values.externalSecrets.store.kind }}
        dataKey: {{ .Values.observabilityAgent.ssm.pathPrefix }}/grafana-service-account-token
{{- end }}
{{- end }}
