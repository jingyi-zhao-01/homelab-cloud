{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flashsales-postgres-auth
  namespace: {{ include "flashsales.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ printf "%s/POSTGRES_USER" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ printf "%s/POSTGRES_PASSWORD" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ printf "%s/POSTGRES_DB" .Values.externalSecrets.parameterPrefix | quote }}
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ printf "%s/DATABASE_URL" .Values.externalSecrets.parameterPrefix | quote }}
{{- end }}
