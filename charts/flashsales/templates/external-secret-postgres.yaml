{{- if .Values.externalSecrets.enabled }}
{{- $ssm := include "flashsales.ssmParameters" . | fromYaml }}
apiVersion: {{ .Values.externalSecrets.apiVersion | quote }}
kind: ExternalSecret
metadata:
  name: flashsales-postgres-auth
  namespace: {{ include "flashsales.namespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind }}
    name: {{ .Values.externalSecrets.store.name }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range $secretKey, $entry := $ssm }}
    {{- if and (hasPrefix "UPSTASH_" $secretKey) (not $.Values.externalSecrets.includeUpstashRedis) }}
    {{- else }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $entry.path | quote }}
        {{- if default false $entry.optional }}
        optional: true
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
